# CRIT-038 AC1: Backend test gate — zero failures required for merge
# DEBT-007: Added API schema validation, vulnerability scanning, linting
name: Backend Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      OPENAI_API_KEY: sk-test-key
      ENCRYPTION_KEY: bzc732A921Puw9JN4lrzMo1nw0EjlcUdAyR6Z6N7Sqc=
      ENVIRONMENT: test
      SENTRY_DSN: ""
      REDIS_URL: ""
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx pytest-timeout
          pip install pip-audit ruff mypy

      - name: Run tests (exit code 0 required)
        run: |
          cd backend
          pytest tests/ \
            -m "not benchmark" \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --junitxml=pytest-report.xml \
            -v
          echo "✅ All backend tests passed with coverage ≥ 70%"

      # DEBT-111 AC5: Per-module coverage thresholds
      - name: Check per-module coverage thresholds
        if: success()
        run: |
          cd backend
          python scripts/check_module_coverage.py
          echo "✅ Per-module coverage thresholds passed"

      # DEBT-007 CROSS-002: API contract validation — fail if schema drifted
      - name: Validate OpenAPI schema snapshot
        run: |
          cd backend
          python -c "
          import json
          from main import app
          app.openapi_schema = None
          schema = app.openapi()
          if 'servers' in schema:
              del schema['servers']
          with open('tests/snapshots/openapi_schema.json', 'r') as f:
              snapshot = json.load(f)
          if schema != snapshot:
              # Generate diff for review
              with open('tests/snapshots/openapi_schema.diff.json', 'w') as f:
                  json.dump({'snapshot': snapshot, 'current': schema}, f, indent=2, sort_keys=True)
              added = set(schema.get('paths', {})) - set(snapshot.get('paths', {}))
              removed = set(snapshot.get('paths', {})) - set(schema.get('paths', {}))
              msg = 'OpenAPI schema has drifted from snapshot!'
              if added: msg += f' Added: {sorted(added)}'
              if removed: msg += f' Removed: {sorted(removed)}'
              msg += ' Update snapshot: delete tests/snapshots/openapi_schema.json and re-run tests.'
              raise SystemExit(msg)
          print('✅ OpenAPI schema matches snapshot')
          "

      # DEBT-123 AC1: Vulnerability scanning — BLOCKING (security-critical)
      - name: Vulnerability scan (pip-audit)
        run: |
          cd backend
          pip-audit -r requirements.txt
          echo "✅ pip-audit: no known vulnerabilities"

      # DEBT-123 AC9: Linting — intentionally non-blocking (advisory, not security)
      - name: Lint (ruff check)
        run: |
          cd backend
          ruff check . --output-format=github 2>&1 | head -50
          echo "ℹ️ Ruff lint complete (non-blocking)"
        continue-on-error: true  # DEBT-123 AC9: intentional — linting is advisory, not security-critical

      # DEBT-123 AC9: Type checking — intentionally non-blocking (advisory, not security)
      - name: Type check (mypy)
        run: |
          cd backend
          mypy . --ignore-missing-imports --check-untyped-defs 2>&1 | tail -20
          echo "ℹ️ Mypy type check complete (non-blocking)"
        continue-on-error: true  # DEBT-123 AC9: intentional — type checking is advisory, not security-critical
