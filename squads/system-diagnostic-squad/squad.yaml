name: system-diagnostic-squad
version: 1.0.0
description: >
  Squad de diagnostico sem complacencia do SmartLic.
  Cada agente simula um stakeholder real e executa sua jornada critica end-to-end.
  Objetivo: evidencia objetiva de que o sistema funciona para ate 50 usuarios pagantes,
  ou identificacao clara do que nao pode ser comprovado.
author: Tiago Sasaki
license: MIT
slashPrefix: diagnostic

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - usuario-trial.md
    - usuario-pagante.md
    - consultor-licitacao.md
    - admin-operador.md
    - auditor-tecnico.md
  tasks:
    - jornada-trial-to-paid.md
    - jornada-busca-diaria.md
    - jornada-consultor-volume.md
    - jornada-admin-oversight.md
    - auditoria-falhas-silenciosas.md
    - relatorio-diagnostico.md
  workflows:
    - diagnostic-execution.md
  checklists:
    - diagnostic-checklist.md
  templates:
    - diagnostic-report-tmpl.md
  tools: []
  scripts: []

config:
  extends: extend
  coding-standards: ../../docs/framework/coding-standards.md
  tech-stack: ../../docs/framework/tech-stack.md
  source-tree: ../../docs/framework/source-tree.md

dependencies:
  node: []
  python:
    - pytest>=7.0.0
    - httpx>=0.24.0
  squads: []

tags:
  - diagnostic
  - validation
  - production
  - stakeholder-simulation

metadata:
  total_agents: 5
  total_tasks: 6
  estimated_duration: "2-4 hours"
  complexity: "high"
  risk_level: "low"
  production_url: "https://smartlic.tech"
  target_users: 50
  philosophy: "pareto — minimo trabalho, maximo resultado"

blueprint:
  source:
    - CLAUDE.md
    - PRD.md
  created_at: "2026-02-27T00:00:00Z"
  confidence: 0.92
