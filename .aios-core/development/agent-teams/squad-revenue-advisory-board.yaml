      - Sean Lane (Drift/Salesloft) — conversational revenue, pipeline velocity
      - Mary Shea (Outreach) — revenue intelligence, AI-driven sales
      - Tomasz Tunguz (Theory Ventures) — SaaS metrics, benchmarks
      - Jason Lemkin (SaaStr) — B2B SaaS revenue playbook, SMB SaaS
