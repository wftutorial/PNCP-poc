    domain_signals:
      ncm_prefixes:
        - "3917"  # Tubos e seus acessórios de plástico
        - "7307"  # Acessórios para tubos de ferro/aço (conexões)
        - "7412"  # Acessórios para tubos de cobre (conexões)
        - "8413"  # Bombas para líquidos
        - "8481"  # Torneiras, válvulas, registros
        - "6810"  # Artigos de cimento/concreto (caixas d'água)
