# OUTPUT E REGRAS DE ARQUIVO
# ═══════════════════════════════════════════════════════════════════

output_rules:
  file_pattern: "docs/ataque-turbo-{NNN}.md"
  numbering: "Sequencial (001, 002, 003...). Verificar último existente antes de criar."
  unique_leads: true
  dedup_strategy: |
    Antes de gerar output, ler todos os docs/ataque-turbo-*.md existentes
    e extrair CNPJs/nomes de empresas já abordados. Excluir da execução atual.

  file_structure: |
    # Ataque Turbo #{NNN} — {Data}

    ## Metadata
    - Data de execução: {YYYY-MM-DD HH:MM}
    - Setores analisados: {lista}
    - UFs: {lista}
    - Período de editais: {data_inicial} a {data_final}
    - APIs consultadas: PNCP, TCU, ComprasGov v3, Portal da Transparência, OpenCNPJ

    ## Resumo
    - Leads processados: {N}
    - Emails gerados: {N}
    - Total de oportunidades encontradas: {N}
    - Valor total estimado das oportunidades: R$ {valor}

    ## Lead 1 — {Nome da Empresa}
    ### Perfil (Receita Federal)
    - CNPJ: {formatado}
    - Razão Social: {nome}
    - CNAE: {código} — {descrição}
    - Porte: {porte}
    - Capital Social: R$ {valor}
    - UF: {UF}
    - Sócios: {nomes dos sócios do QSA}

    ### Histórico de Licitações (PNCP)
    - Contratos nos últimos 12 meses: {N}
    - Valor total contratado: R$ {valor}
    - Órgãos frequentes: {lista}
    - Setores de atuação: {lista}

    ### Oportunidades Encontradas
    - Total: {N}
    - Valor total estimado: R$ {valor}
    - Amostra grátis: {K} de {N} ({ratio}%)
    - Preço do relatório: R$ {preço}
    - Justificativa do preço: {explicação}

    ### Email
    ```
    {email completo pronto para copy/paste}
    ```

    ---
    {Repetir para cada lead}

    ## Métricas da Execução
    - Tempo total: {duração}
    - Requests PNCP: {N}
    - Requests TCU (certidões + contratos + inabilitados): {N}
    - Requests ComprasGov v3: {N}
    - Requests Portal da Transparência: {N}
    - Requests OpenCNPJ: {N}
    - Editais pré-dedup: {N} | Pós-dedup: {N} | Duplicatas removidas: {N}
    - Leads descartados por sanção TCU/CEIS/CNEP: {N}
    - Fontes utilizadas: {lista de fontes que retornaram dados}
    - Leads descartados total: {N} (motivos: {lista})

# ═══════════════════════════════════════════════════════════════════
# CONSTRAINTS E QUALITY GATES
# ═══════════════════════════════════════════════════════════════════

auto_save:
  enabled: true
  description: |
    O relatório DEVE ser salvo automaticamente ao final da execução.
    O usuário NUNCA deve precisar pedir para salvar.
    Usar Write tool para criar docs/ataque-turbo-NNN.md.
    Confirmar salvamento com path completo no output final.

constraints:
  - "SALVAR AUTOMATICAMENTE ao final — nunca esperar pedido do usuário"
  - "Zero chamadas OpenAI API — emails redigidos manualmente pelo squad"
  - "Dados exclusivamente reais de APIs públicas — NUNCA fabricar"
  - "Acentuação correta em todo texto PT-BR"
  - "Cada oportunidade DEVE incluir link oficial do edital (preferencialmente PNCP)"
  - "Leads inéditos a cada execução (dedup contra runs anteriores)"
  - "DEDUP cross-source OBRIGATÓRIO antes de contar ou listar oportunidades"
  - "tamanhoPagina: 50 para PNCP /contratacoes, 500 para PNCP /contratos"
  - "Rate limiting: respeitar Retry-After do PNCP, 90 req/min Portal da Transparência"
  - "OpenCNPJ: até 50 req/s (respeitar, não abusar)"
  - "Identidade: SEMPRE Tiago Sasaki, Eng. Software CONFENGE"
  - "NUNCA incentivar assinaturas ou mencionar planos"
  - "Qualidade > Quantidade — menos leads, mais profundidade"
  - "TESTE DE IMPACTO obrigatório: email deve causar reação 'CARALHO' (ver quality_gates.impact_test)"
  - "Consultar TODAS as fontes disponíveis (não apenas PNCP) antes de concluir busca"

quality_gates:
  impact_test: |
    ╔══════════════════════════════════════════════════════════════╗
    ║  TESTE DE IMPACTO (GATE FINAL OBRIGATÓRIO)                 ║
    ║                                                            ║
    ║  Ao ler o email, o lead deve pensar:                       ║
    ║  "CARALHO, como não conheci esse cara antes?!"             ║
    ║                                                            ║
    ║  Se o email NÃO causa esse efeito visceral:                ║
    ║  → A investigação NÃO foi profunda o suficiente            ║
    ║  → O texto NÃO é personalizado o suficiente                ║
    ║  → VOLTAR para fase 2 (investigação) e aprofundar          ║
    ║                                                            ║
    ║  Indicadores de que o email PASSA no teste:                ║
    ║  ✓ Menciona dados que o lead não sabia que eram públicos   ║
    ║  ✓ Cruza informações de forma que surpreende               ║
    ║  ✓ Demonstra conhecimento do perfil que parece "insider"   ║
    ║  ✓ Cada oportunidade tem justificativa cirúrgica           ║
    ║  ✓ O valor do relatório é tão óbvio que recusar dói        ║
    ║                                                            ║
    ║  Indicadores de FALHA no teste:                            ║
    ║  ✗ Email poderia ser enviado para qualquer empresa         ║
    ║  ✗ Análise de relevância é genérica/vaga                   ║
    ║  ✗ Não há cruzamento com histórico específico do lead      ║
    ║  ✗ Tom de "cold email template" impessoal                  ║
    ║  ✗ Lead pensa "mais um email de vendas"                    ║
    ╚══════════════════════════════════════════════════════════════╝

  pre_email:
    - "Certidão TCU consolidada verificada (NADA_CONSTA em todas)?"
    - "Sócios do QSA verificados contra lista TCU inabilitados?"
    - "Lead tem ≥3 contratos homologados nos últimos 12 meses (cross-source)?"
    - "Porte justifica compra do relatório (no-brainer test)?"
    - "Existem editais abertos que matcham o perfil?"
    - "Link oficial de cada edital foi verificado/construído?"
    - "Análise de relevância é personalizada (não genérica)?"
    - "Dedup cross-source aplicado (sem duplicatas entre PNCP/ComprasGov/TCU/etc.)?"
    - "TESTE DE IMPACTO: email causa reação 'CARALHO'? (ver impact_test)"
  pre_output:
    - "Acentuação revisada em todos os emails?"
    - "Todos os links de editais estão no formato correto e funcionais?"
    - "Nenhum dado fabricado — todos verificáveis via API?"
    - "Tom alinhado com copy da landing page?"
    - "Nenhuma menção a assinatura/plano/trial?"
    - "Dedup verificado contra ataque-turbo-*.md anteriores?"
    - "Fontes multi-source documentadas no metadata do relatório?"

success_criteria:
  - "minimum_qualified_leads: 3 (qualidade > quantidade)"
  - "real_multi_source_data: true (verificável — PNCP + ComprasGov + outros)"
  - "cross_source_dedup_applied: true (sem duplicatas entre fontes)"
  - "zero_openai_calls: true"
  - "emails_ready_to_send: true (copy/paste)"
  - "all_links_verified: true"
  - "proper_pt_br_accents: true"
  - "personalized_relevance_analysis: true (não genérico)"
  - "impact_test_passed: true (reação 'CARALHO' em cada email)"
  - "no_brainer_test_passed: true (todos os leads)"
  - "dedup_against_previous_runs: true"
  - "sender_identity_correct: true (CONFENGE, não SmartLic)"

