    approach: "Relatório focado em eficiência de triagem"

# ═══════════════════════════════════════════════════════════════════
# APIs E CURL COMMANDS (REFERÊNCIA TÉCNICA)
# ═══════════════════════════════════════════════════════════════════

api_reference:
  pncp:
    base_url: "https://pncp.gov.br/api/consulta/v1"
    max_page_size: 50  # CRÍTICO: >50 retorna HTTP 400
    date_format: "YYYYMMDD"

    endpoints:
      search_open_tenders: |
        # Buscar editais abertos (publicações recentes)
        curl -s "https://pncp.gov.br/api/consulta/v1/contratacoes/publicacao\
          ?dataInicial={YYYYMMDD}\
          &dataFinal={YYYYMMDD}\
          &pagina=1\
          &tamanhoPagina=50" | python -m json.tool

      contracts_bulk: |
        # Contratos publicados em período (tamanhoPagina max 500 — diferente de contratacoes!)
        # ATENÇÃO: NÃO existe filtro cnpjFornecedor. Filtrar client-side por niFornecedor.
        curl -s "https://pncp.gov.br/api/consulta/v1/contratos\
          ?dataInicial={YYYYMMDD}\
          &dataFinal={YYYYMMDD}\
          &pagina=1\
          &tamanhoPagina=500" | python -m json.tool

        # Filtrar por fornecedor client-side:
        # data['data'][i]['niFornecedor'] == CNPJ_ALVO

      procurement_detail: |
        # Detalhe de uma compra específica
        curl -s "https://pncp.gov.br/api/consulta/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}" \
          | python -m json.tool

      procurement_items: |
        # Itens de uma compra (com detalhes dos objetos)
        curl -s "https://pncp.gov.br/api/consulta/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}/itens?pagina=1" \
          | python -m json.tool

      item_results: |
        # Resultados/vencedores de um item (API de Manutenção — /api/pncp/, não /api/consulta/)
        curl -s "https://pncp.gov.br/api/pncp/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}/itens/{NUM_ITEM}/resultados" \
          | python -m json.tool
        # Retorna: niFornecedor, nomeRazaoSocialFornecedor, valorTotalHomologado, porteFornecedorNome

      items_maintenance: |
        # Itens via API de Manutenção (inclui temResultado e situacaoCompraItemNome)
        curl -s "https://pncp.gov.br/api/pncp/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}/itens?pagina=1" \
          | python -m json.tool
        # situacaoCompraItem: 1=Aberto, 2=Homologado, 3=Deserto, 5=Fracassado

    link_construction: |
      URL do edital no portal:
        https://pncp.gov.br/app/editais/{CNPJ_ORGAO}/{ANO}/{SEQUENCIAL}

      Construção a partir de numeroControlePNCP (formato: {CNPJ}-{TIPO}-{SEQ_PADDED}/{ANO}):
        1. Split por "/" → [antes, ano]
        2. Split antes por "-" → [cnpj, tipo, sequencial]
        3. Strip leading zeros do sequencial
        4. URL: https://pncp.gov.br/app/editais/{cnpj}/{ano}/{sequencial_sem_zeros}

      Prioridade de link:
        1. linkSistemaOrigem (86% preenchido)
        2. linkProcessoEletronico (sempre vazio, defensive fallback)
        3. URL construída via numeroControlePNCP (14% dos registros)

      Já implementado em: backend/search_pipeline.py → _build_pncp_link()

    key_response_fields: |
      Publicações (editais abertos):
        - numeroControlePNCP: identificador único
        - orgaoEntidade.cnpj: CNPJ do órgão
        - orgaoEntidade.razaoSocial: nome do órgão
        - objetoCompra: descrição do objeto
        - valorTotalEstimado: valor estimado
        - anoCompra, sequencialCompra: para construir link
        - dataAberturaProposta: prazo para propostas
        - modalidadeNome: modalidade da licitação
        - unidadeOrgao.ufSigla: UF
        - linkSistemaOrigem: link externo do edital

      Contratos (histórico de vitórias):
        - niFornecedor: CNPJ do fornecedor
        - nomeRazaoSocialFornecedor: nome do fornecedor
        - objetoContrato: objeto contratado
        - valorGlobal: valor do contrato
        - orgaoEntidade.razaoSocial: órgão contratante
        - dataAssinatura: data da assinatura

  receita_federal:
    primary_api: "OpenCNPJ (melhor para batch — 50 req/s, sem auth)"
    fallback_api: "BrasilAPI (3-5 req/s, sem auth)"

    endpoints:
      opencnpj: |
        # RECOMENDADO para batch (50 req/s, sem autenticação)
        curl -s "https://api.opencnpj.org/{CNPJ_SEM_PONTUACAO}" | python -m json.tool

      brasilapi: |
        # Fallback (3-5 req/s)
        curl -s "https://brasilapi.com.br/api/cnpj/v1/{CNPJ_SEM_PONTUACAO}" | python -m json.tool

    key_response_fields: |
      - razao_social: nome oficial da empresa
      - nome_fantasia: nome comercial
      - cnae_principal / cnae_fiscal: atividade econômica principal
      - cnaes_secundarios: atividades secundárias
      - porte_empresa / porte: MEI, ME, EPP, DEMAIS
      - capital_social: capital social (proxy de porte financeiro)
      - situacao_cadastral: ATIVA, BAIXADA, etc.
      - logradouro, municipio, uf: endereço
      - email, telefones: contato
      - qsa: quadro societário (nomes dos sócios e qualificação)

    revenue_estimation: |
      IMPORTANTE: Nenhuma API pública fornece faturamento real.
      Proxies disponíveis:
      - capital_social: indicador de porte (correlação moderada com faturamento)
      - porte: MEI (< R$81K/ano), ME (< R$360K), EPP (< R$4.8M), DEMAIS (> R$4.8M)
      - Volume de contratos PNCP: soma de valorGlobal nos últimos 12 meses
      - Volume de contratos ComprasGov: soma adicional de fontes complementares
      - Nº de funcionários: não disponível publicamente
      O @analyst deve usar porte + volume TOTAL de contratos (todas as fontes) como proxy.

  # ───────────────────────────────────────────────────────────────
  # FONTES COMPLEMENTARES (ALÉM DO PNCP)
  # ───────────────────────────────────────────────────────────────

  comprasgov_v3:
    description: "ComprasGov v3 — Dados Abertos (Portal de Compras Governamentais)"
    base_url: "https://dadosabertos.compras.gov.br"
    auth: |
      JWT Token obrigatório. Registrar em dadosabertos.compras.gov.br e fazer login:
      POST /usuarios/criar (registro) → POST /autenticacao/login (JWT)
      Header: Authorization: Bearer {JWT_TOKEN}
      Sem auth, endpoints retornam 404.
    coverage: "Federal (compras.gov.br — licitações federais)"
    priority: 3  # Terceira fonte (após PNCP=1 e PCP=2)

    endpoints:
      search_supplier: |
        # MELHOR ENTRADA: buscar fornecedor por CNPJ ou CNAE
        # Retorna dados cadastrais + histórico do fornecedor no ComprasGov
        curl -s "https://dadosabertos.compras.gov.br/modulo-fornecedor/1_consultarFornecedor\
          ?cnpj-cpf={CNPJ_SEM_PONTUACAO}" | python -m json.tool

        # Busca por CNAE (útil para descobrir fornecedores de um setor):
        curl -s "https://dadosabertos.compras.gov.br/modulo-fornecedor/1_consultarFornecedor\
          ?natureza-juridica-fornecedor={CODIGO_CNAE}" | python -m json.tool

      award_results: |
        # Resultados de itens de contratações Lei 14.133 (com vencedores)
        curl -s "https://dadosabertos.compras.gov.br/modulo-contratacoes/\
          3_consultarResultadoItensContratacoes_PNCP_14133\
          ?pagina=1&tamanhoPagina=50" | python -m json.tool

        # Filtros disponíveis: dataResultado, codigoUasg, etc.
        # Retorna: cnpjFornecedor, nomeRazaoSocial, valorUnitarioHomologado

      procurement_items: |
        # Itens de contratações com detalhes
        curl -s "https://dadosabertos.compras.gov.br/modulo-contratacoes/\
          2_consultarItensContratacoes_PNCP_14133\
          ?pagina=1&tamanhoPagina=50" | python -m json.tool

    key_fields: |
      Fornecedor: cnpj, razaoSocial, uf, cnae, habilitado
      Resultado: cnpjFornecedor, valorUnitarioHomologado, quantidade, dataResultado

  portal_transparencia:
    description: "Portal da Transparência — API de Contratos e Licitações Federais"
    base_url: "https://api.portaldatransparencia.gov.br/api-de-dados"
    auth: |
      Token obrigatório (cadastro gratuito em portaldatransparencia.gov.br)
      Header: chave-api-dados: {TOKEN}
      Rate limit: 90 req/min (06h-01h), 450 req/min (01h-06h)
    coverage: "Federal — contratos, licitações, despesas"
    priority: 4  # Quarta fonte

    endpoints:
      contracts_by_supplier: |
        # OURO PARA PROSPECÇÃO: contratos por CNPJ do fornecedor (endpoint dedicado!)
        curl -s -H "chave-api-dados: {TOKEN}" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/contratos/cpf-cnpj\
          ?cpfCnpj={CNPJ_SEM_PONTUACAO}\
          &pagina=1" | python -m json.tool

      contracts_by_date: |
        # Contratos por período (todos os fornecedores)
        curl -s -H "chave-api-dados: {TOKEN}" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/contratos\
          ?dataInicial={DD/MM/AAAA}&dataFinal={DD/MM/AAAA}\
          &pagina=1" | python -m json.tool

      bid_participants: |
        # Participantes de uma licitação (quem competiu, quem venceu)
        curl -s -H "chave-api-dados: {TOKEN}" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/licitacoes/participantes\
          ?codigoUG={CODIGO_UG}&numero={NUMERO}&codigoModalidade={COD_MOD}\
          &pagina=1" | python -m json.tool

      open_tenders: |
        # Licitações em andamento
        curl -s -H "chave-api-dados: {TOKEN}" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/licitacoes\
          ?dataInicial={DD/MM/AAAA}&dataFinal={DD/MM/AAAA}\
          &pagina=1" | python -m json.tool

      legal_entity: |
        # Dados de pessoa jurídica (complementar ao OpenCNPJ)
        curl -s -H "chave-api-dados: {TOKEN}" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/pessoa-juridica\
          ?cnpj={CNPJ_SEM_PONTUACAO}" | python -m json.tool

    key_fields: |
      Contratos: fornecedor (cnpjCpf, nome), objeto, valor, vigencia, orgao
      Participantes: fornecedor, resultado (vencedor/perdedor), valor proposto
      Licitações: modalidade, objeto, valorEstimado, orgao, situacao

    notes: |
      ATENÇÃO: Requer cadastro prévio para obter token (gratuito).
      Cadastro: portaldatransparencia.gov.br/api-de-dados/cadastrar-email
      Rate limit: 90 req/min (06h-01h), 300 req/min (01h-06h)
      Se token não disponível, PNCP + TCU cobrem a maioria dos dados.
      Swagger: https://api.portaldatransparencia.gov.br/

  compras_dados_legacy:
    description: "Compras.dados.gov.br — API Legacy de Fornecedores"
    base_url: "https://compras.dados.gov.br"
    auth: "Nenhuma (dados abertos)"
    coverage: "Federal (cadastro ComprasNet)"
    priority: 5  # Quinta fonte (legacy)

    endpoints:
      suppliers_by_uf: |
        # Fornecedores cadastrados por UF
        curl -s "https://compras.dados.gov.br/fornecedores/v1/fornecedores.json\
          ?uf={UF_SIGLA}" | python -m json.tool

        # Fornecedores habilitados com filtro
        curl -s "https://compras.dados.gov.br/fornecedores/v1/fornecedores.json\
          ?cnpj={CNPJ_SEM_PONTUACAO}" | python -m json.tool

    key_fields: |
      cnpj, nome, uf, habilitado, ativo
      HATEOAS: links para navegação de resultados

    notes: |
      API REST + HATEOAS. Útil para validar se fornecedor está cadastrado
      no ComprasNet. Dados limitados — usar como complemento, não fonte primária.

  tcu:
    description: "TCU — Tribunal de Contas da União (3 APIs verificadas, sem auth)"
    auth: "Nenhuma (totalmente público)"
    coverage: "Federal (contratos TCU + certidões multi-registro + inabilitados)"
    priority: 2  # Alta prioridade — verificada e sem auth

    endpoints:
      contracts: |
        # Contratos do TCU (3.835+ registros, sem auth, VERIFICADO FUNCIONANDO)
        # Inclui CNPJ e nome do fornecedor, objeto, valores, datas
        curl -s "https://contas.tcu.gov.br/contrata2RS/api/publico/termos-contratuais" \
          | python -m json.tool

        # Campos-chave:
        # cnpjFornecedor, nomeFornecedor, objeto, valorInicial, valorAtualizado,
        # modalidadeLicitacao, unidadeGestora, dataAssinatura, numeroProcesso,
        # dataInicioVigencia, dataTerminoVigencia, numeroAditamentos

      certidoes: |
        # JOIA PARA QUALIFICAÇÃO: certidão consolidada multi-registro por CNPJ
        # Uma única chamada verifica TCU, CNJ, CEIS (sanções), CNEP
        # Sem auth, VERIFICADO FUNCIONANDO
        curl -s "https://certidoes-apf.apps.tcu.gov.br/api/rest/publico/certidoes/{CNPJ_SEM_PONTUACAO}" \
          | python -m json.tool

        # Resposta inclui:
        # razaoSocial, nomeFantasia, cnpj
        # certidoes[]: array de certificados de múltiplos registros
        #   - cada certidão tem "situacao": "NADA_CONSTA" (limpo) ou registro de sanção
        #   - fontes: TCU, CNJ, Portal da Transparência (CEIS, CNEP)
        #
        # USAR PARA: descartar leads sancionados ANTES de gastar tempo com investigação

      inabilitados: |
        # Lista de pessoas inabilitadas (impedidas de participar de licitações)
        # Sem auth, VERIFICADO FUNCIONANDO
        curl -s "https://contas.tcu.gov.br/ords/condenacao/consulta/inabilitados" \
          | python -m json.tool

        # Por CPF específico:
        curl -s "https://contas.tcu.gov.br/ords/condenacao/consulta/inabilitados/{CPF}" \
          | python -m json.tool

        # Campos: nome, cpf, processo, deliberacao, data_transito_julgado, data_final, uf, municipio
        # USAR PARA: verificar se sócios do QSA estão impedidos

    qualification_workflow: |
      WORKFLOW DE QUALIFICAÇÃO VIA TCU (executar para cada lead):
      1. Consultar certidões consolidadas → descartar se sancionado
      2. Verificar sócios do QSA (via OpenCNPJ) contra inabilitados
      3. Se lead passa nos dois checks → prosseguir para investigação
      Este check é GRATUITO e SEM AUTH — executar antes de investir tempo na investigação CSI.

  # ───────────────────────────────────────────────────────────────
  # ESTRATÉGIA DE DEDUP CROSS-SOURCE
  # ───────────────────────────────────────────────────────────────

  dedup_strategy:
    description: |
      Licitações e contratos podem aparecer em múltiplas fontes (PNCP,
      ComprasGov, Portal da Transparência). Dedup obrigatório para não
      contar o mesmo edital duas vezes e não incluir duplicatas no email.

    algorithm: |
      DEDUP DE 2 CAMADAS (adaptado de backend/consolidation.py):

      Tier 1 — Chave Estruturada (prioridade):
        {cnpj_orgao}:{numero_edital_or_contrato}:{ano}
        Cobertura: ~85% dos registros (quando número do edital disponível)

      Tier 2 — Fallback por Conteúdo (quando Tier 1 falha):
        {cnpj_orgao}:{MD5(objeto_resumido)[:12]}:{valor_or_data}
        Cobertura: ~15% restantes (registros sem número padronizado)

      Dedup de Vencedores/Contratos:
        {cnpj_buyer}:{procurement_id}:{ano}:{cnpj_winner}
        Garante que o mesmo contrato de um mesmo fornecedor não é duplicado.

    source_priority: |
      Quando mesmo edital/contrato aparece em múltiplas fontes, manter o de maior prioridade:
        1. PNCP (mais completo, link oficial funcional, fed+estadual+municipal)
        2. TCU Contratos (verificado, sem auth, mas limitado a contratos do TCU)
        3. ComprasGov v3 (dados abertos federais, requer JWT)
        4. Portal da Transparência (complementar, requer API key)
        5. Compras.dados.gov.br legacy (menor granularidade, intermitente)

      Exceção: se a fonte de menor prioridade tem mais dados (ex: valor estimado
      preenchido vs ausente), ENRIQUECER o registro de maior prioridade com esses dados.

    implementation_notes: |
      - Normalizar CNPJ: remover pontuação, strip leading zeros
      - Normalizar objeto: lowercase, remover acentos, strip whitespace extra
      - Log discrepâncias >5% de valor entre fontes (sinal de dados inconsistentes)
      - Manter campo `fontes: ["PNCP", "ComprasGov"]` no registro final (mostra cobertura)

# ═══════════════════════════════════════════════════════════════════
# WORKFLOW DE EXECUÇÃO (5 FASES)
# ═══════════════════════════════════════════════════════════════════

coordination:
  lead_agent: analyst
  quality_philosophy: |
    QUALIDADE > QUANTIDADE. Cada lead é investigado em profundidade.
    Melhor 3 leads com emails irresistíveis do que 10 leads genéricos.
    Investigação nível CSI: cruzar todas as fontes disponíveis para
    cada lead antes de redigir o email.

  execution_sequence:
    - phase: 1_discovery
      name: "Descoberta Multi-Fonte de Vencedores Frequentes"
      agents: [data-engineer, dev]
      deliverable: |
        Para cada setor de interesse:
        1. Query PNCP /contratos com filtros de data (últimos 12 meses) — tamanhoPagina=500
        2. Query ComprasGov v3 /modulo-fornecedor para fornecedores por CNAE do setor
        3. Query ComprasGov v3 /resultado-itens para vencedores recentes (Lei 14.133)
        4. (Opcional) Query Portal da Transparência contratos se token disponível
        5. DEDUP cross-source: aplicar Tier 1 + Tier 2 (ver dedup_strategy)
        6. Agregar por cnpjFornecedor: contar vitórias (TOTAL cross-source), somar valores, listar órgãos
        7. Identificar empresas com ≥3 contratos homologados (somando todas as fontes)
        8. Filtrar empresas com padrão consistente (não apenas 1 contrato grande)
        9. Manter campo `fontes` por registro (e.g., ["PNCP", "ComprasGov"])
        Output: Lista de CNPJs candidatos com métricas de participação e cobertura multi-fonte

    - phase: 2_enrichment
      name: "Investigação CSI do Lead"
      agents: [data-engineer, analyst]
      dependencies: [1_discovery]
      deliverable: |
        Para cada CNPJ candidato:
        1. CHECK TCU PRIMEIRO (gratuito, sem auth, elimina rápido):
           a. Certidões consolidadas → descartar se QUALQUER sanção ativa (CEIS/CNEP/TCU/CNJ)
           b. Verificar sócios contra lista de inabilitados
           Se sancionado → DESCARTAR IMEDIATAMENTE (não gastar tempo)
        2. Query OpenCNPJ → razão social, CNAE, porte, capital social, QSA, contato
        3. Verificar se porte justifica compra do relatório (no-brainer test)
        4. Analisar padrão de vitórias: setores, valores médios, órgãos frequentes
           (agregar dados cross-source: PNCP + ComprasGov + TCU + Portal Transparência)
        5. Identificar sócios/decisores via QSA (nome + qualificação)
        6. (Opcional) Portal da Transparência: contratos/cpf-cnpj para perfil federal completo
        7. Descartar se: situação != ATIVA, capital_social < R$50.000, sem contato

        Critério no-brainer: valor total de oportunidades abertas encontradas
        deve ser ≥10x o preço do relatório. Se empresa vence licitações de
        R$200K+ e o relatório custa R$1.500, é no-brainer (133x).

    - phase: 3_matching
      name: "Cruzamento Multi-Fonte Editais Abertos × Perfil do Lead"
      agents: [data-engineer, analyst]
      dependencies: [2_enrichment]
      deliverable: |
        Para cada lead qualificado:
        1. Determinar setores/keywords relevantes (do CNAE + histórico de vitórias)
        2. Query PNCP publicações abertas (últimos 10 dias) com filtros de setor/UF
        3. Query ComprasGov v3 resultado-itens para contratações recentes abertas
        4. (Opcional) Query Portal da Transparência licitações abertas se token disponível
        5. DEDUP cross-source: aplicar Tier 1 + Tier 2 antes de filtrar
        6. Filtrar editais dedupados que matcham o perfil do lead:
           - Mesmo setor/CNAE
           - UF compatível (mesma UF ou UFs onde já venceu)
           - Faixa de valor compatível (dentro do range histórico do lead)
           - Modalidade compatível
        7. Ranquear editais por relevância (maior match com perfil = mais relevante)
        8. Construir link oficial para cada edital:
           - PNCP: https://pncp.gov.br/app/editais/{CNPJ}/{ANO}/{SEQ}
           - ComprasGov: link direto se disponível nos dados da API
           - Portal Transparência: link do portal se disponível
           Priorizar link PNCP quando edital existe em múltiplas fontes.
        9. Contar total N de oportunidades ÚNICAS encontradas (pós-dedup)

        Se N = 0 para um lead: descartar (não há valor a entregar).
        Se N < 3: avaliar se vale incluir (pode ser email mais curto).

    - phase: 4_qualification
      name: "Qualificação Final e Decisões do @analyst"
      agents: [analyst]
      dependencies: [3_matching]
      deliverable: |
        Para cada lead com oportunidades encontradas, o @analyst decide:

        A) FRAÇÃO GRÁTIS (quantas licitações mostrar no email):
           Diretriz geral (ajustável caso a caso):
           | Total (N) | Mostrar grátis (K) | Ratio  |
           |:---------:|:------------------:|:------:|
           | 1-5       | 1                  | ~20%   |
           | 6-15      | 2                  | ~15%   |
           | 16-30     | 3                  | ~10%   |
           | 31+       | 3-4                | <10%   |

           Fatores que influenciam:
           - Valor agregado (alto valor = menos amostra)
           - Perfil do lead (lead grande merece amostra mais impressionante)
           - Qualidade das amostras (escolher as mais impactantes)

        B) QUAIS licitações mostrar (a melhor amostra):
           Critérios para seleção da amostra:
           - Maior match com histórico de vitórias do lead
           - Maior valor estimado (impressiona mais)
           - Prazo razoável (não muito próximo do vencimento)
           - Diversidade de órgãos (mostra amplitude da cobertura)

        C) PREÇO do relatório completo:
           Base: R$1.500 (micro/pequena) a R$3.000 (média empresa)
           Critérios: valor total das oportunidades, porte do lead, complexidade
           Regra: preço ≤ 1% do valor total de oportunidades encontradas

        D) ANÁLISE DE RELEVÂNCIA para cada licitação de amostra:
           Para cada oportunidade mostrada no email, redigir justificativa:
           - Por que esta licitação é relevante PARA ESTE LEAD ESPECÍFICO
           - Cruzar com vitórias passadas (mesmo tipo de objeto/órgão/valor)
           - Indicar modalidade, prazo, valor estimado
           - Indicar nível de concorrência esperado (se dados disponíveis)

    - phase: 5_email_and_save
      name: "Redação do Email + Salvamento Automático"
      agents: [po, dev]
      dependencies: [4_qualification]
      deliverable: |
        Para cada lead, gerar email personalizado seguindo:
        1. Template com acentuação correta em PT-BR
        2. Identidade do remetente: Tiago Sasaki, Eng. Software CONFENGE
        3. Cada oportunidade com link oficial do PNCP
        4. Análise personalizada de por que cada oportunidade é relevante
        5. CTA: relatório completo via PIX
        6. Tom alinhado com landing page (inteligência de decisão, filtro estratégico)

        SALVAMENTO AUTOMÁTICO (OBRIGATÓRIO — executar sem pedir confirmação):
        7. Determinar próximo número sequencial (ler docs/ataque-turbo-*.md existentes)
        8. Salvar arquivo completo em docs/ataque-turbo-NNN.md usando Write tool
        9. Confirmar salvamento no output final com path do arquivo
        O usuário NUNCA deve precisar pedir para salvar. É automático.

# ═══════════════════════════════════════════════════════════════════
# COPY E TOM DE VOZ (ALINHADO COM LANDING PAGE)
# ═══════════════════════════════════════════════════════════════════

copy_guidelines:
  positioning: "Inteligência de decisão para licitações públicas"
  algorithm_description: |
    O SmartLic consolida fontes oficiais, classifica por relevância setorial
    e avalia viabilidade com critérios objetivos — modalidade, prazo, valor
    e compatibilidade geográfica.

  preferred_phrases:
    - "Filtro estratégico de oportunidades"
    - "Avaliação objetiva de viabilidade"
    - "Vale a pena ou não, e por quê"
    - "Chance real de retorno"
    - "Elimina o que não faz sentido para o seu perfil"
    - "Critérios de viabilidade"
    - "Foco no que paga"
    - "Fontes oficiais verificadas"

  BANNED_phrases:
    - "PNCP" (dizer "fontes oficiais" em vez disso)
    - "Descobrir" / "Explorar" (muito fraco para o valor entregue)
    - "Plano" / "Assinatura" / "Pacote" / "Busca"
    - "Inteligência automatizada" / "Inovador"
    - "95% de precisão" ou qualquer métrica de velocidade/acurácia
    - "Agregador de dados"
    - "IA generativa" (dizer "algoritmo de classificação" em vez disso)
    - "Assine" / "Teste grátis" / "Trial"

  language_rules:
    - "Acentuação correta obrigatória em todo texto PT-BR"
    - "Usar cedilha (ç), til (ã, õ), agudo (á, é, í, ó, ú), circunflexo (â, ê, ô)"
    - "Revisar cada email antes de finalizar"
    - "Números: R$ com ponto para milhares (R$ 1.500, R$ 200.000)"

# ═══════════════════════════════════════════════════════════════════
# TEMPLATE DE EMAIL
# ═══════════════════════════════════════════════════════════════════

email_template: |
  Estrutura do email (adaptada pelo @po caso a caso, SEMPRE com acentuação PT-BR):

  ---
  Assunto: {Nome da Empresa} — identificamos {N} oportunidades de licitação no perfil de vocês

  Olá {Nome do decisor ou genérico},

  Sou Tiago Sasaki, engenheiro de software da CONFENGE e criador do
  SmartLic.tech — uma plataforma de inteligência de decisão para licitações
  públicas que estamos finalizando para lançamento.

  {Parágrafo personalizado CSI — demonstrar conhecimento profundo:
   - Mencionar setor de atuação (inferido do CNAE/histórico)
   - Referência sutil ao volume de participação em licitações
   - Frase que mostre que o algoritmo entende o perfil da empresa}

  Nosso algoritmo de classificação — já validado e operacional — consolida
  fontes oficiais e avalia cada edital contra critérios objetivos de
  viabilidade: compatibilidade setorial, faixa de valor, prazo e geografia.

  Rodei uma análise para o perfil da {Empresa} e o filtro identificou
  **{N} licitações abertas** com alta relevância. Aqui estão {K} delas:

  **1. {Objeto resumido}**
  • Órgão: {razaoSocial do órgão}
  • Valor estimado: R$ {valor}
  • Modalidade: {modalidade}
  • Prazo: {dataAberturaProposta}
  • Link: {https://pncp.gov.br/app/editais/CNPJ/ANO/SEQ}
  • **Por que é relevante para a {Empresa}:** {Análise personalizada —
    cruzamento com histórico de vitórias, setor, valor, órgão familiar}

  {Repetir para licitação 2 e 3 se K >= 2 ou 3}

  As outras {N-K} oportunidades incluem editais de {resumo dos
  setores/valores/órgãos}, todos filtrados pelo mesmo critério de
  compatibilidade com o perfil da {Empresa}.

  **Quer receber a lista completa com análise de viabilidade para cada uma?**
  Enviamos o relatório em PDF com as {N} oportunidades detalhadas por
  R$ {preço} via PIX. Cada oportunidade vem com avaliação objetiva de
  viabilidade e link direto para o edital oficial.

  Fico à disposição para qualquer dúvida.

  Abraço,
  Tiago Sasaki
  Engenheiro de Software — CONFENGE
  Criador do SmartLic.tech
  smartlic.tech
  ---

  REGRAS DO TEMPLATE:
  - Acentuação correta OBRIGATÓRIA (á, é, í, ó, ú, ã, õ, ç, â, ê, ô)
  - Cada licitação DEVE ter link oficial do PNCP
  - Análise de relevância DEVE ser personalizada (cruzar com perfil)
  - NUNCA mencionar "assinatura", "plano", "trial"
  - NUNCA fabricar dados — usar apenas dados reais do PNCP
  - Tom: profissional, direto, focado em valor financeiro

