      - Mark Roberge (ex-HubSpot CRO) — scientific sales, inbound sales
      - Aaron Ross (Predictable Revenue) — outbound B2B, SDR model
      - Manny Medina (Outreach) — sales engagement, enterprise sales
      - Tiago Dalvi (Olist) — B2B marketplace Brazil, SMB aggregation
      - Geraldo Thomaz (VTEX) — enterprise sales Brazil, gov integrations
      - Nick Mehta (Gainsight) — customer success as revenue driver
      - Sangram Vajre (GTM Partners) — go-to-market B2B, account-based revenue

  # Cluster 4 — Marketplace & API Monetization (7 especialistas)
  - name: Marketplace & API Monetization
    icon: "\U0001F310"
    perspective: >
      API-as-product, data monetization, marketplace take rates,
      platform economics, developer ecosystem, data-as-a-service,
      aggregation theory, transaction-based pricing, embedded finance.
      "Dados de licitacao tem valor como API? Existe mercado para data-as-a-service?"
    representatives:
      - Jeff Lawson (Twilio) — API economy, developer-first monetization
      - Bill Gurley (Benchmark) — marketplace economics, take rates, GMV
      - Simon Wardley (Wardley Maps) — platform evolution, commoditization
      - Vinicius Roveda (ContaAzul) — SaaS marketplace Brazil, SMB ecosystem
