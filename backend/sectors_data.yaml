# =============================================================================
# Multi-sector keyword configuration for SmartLic procurement search.
#
# Each sector defines keywords, exclusions, context_required_keywords, and
# max_contract_value used by filter.py to identify relevant procurement
# opportunities in PNCP data.
#
# Loaded by sectors.py at startup.
# =============================================================================

sectors:
  vestuario:
    name: "Vestuário e Uniformes"
    description: "Uniformes, fardamentos, roupas profissionais, EPIs de vestuário"
    max_contract_value: 5000000  # R$ 5M
    viability_value_range: [50000, 2000000]  # D-04: ideal R$50k-R$2M
