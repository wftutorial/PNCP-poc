# =============================================================================
# Intel-Busca Sector Configuration — extends sectors_data.yaml
#
# This file contains sector-specific configuration for the /intel-busca command.
# It maps CNAE prefixes to sectors, defines keyword refinements per CNAE,
# incompatible object patterns, and sector matching hints.
#
# Previously these were hardcoded in collect-report-data.py and intel-collect.py.
# Now they live here as data, making it trivial to add new sectors.
#
# To add a new sector:
#   1. Add the sector in sectors_data.yaml (name, keywords, exclusions, etc.)
#   2. Add the sector key here with cnae_prefixes, refinements, etc.
#   3. Run tests: pytest scripts/tests/test_intel_collect.py -v
#
# Loaded by: collect-report-data.py (map_sector, keyword gate)
# =============================================================================

# CNAE 4-digit prefix -> sector_key mapping (reverse lookup built at load time)
# Each sector lists which CNAE prefixes belong to it.
sectors:

  engenharia:
    cnae_prefixes:
      - "4120"  # Construção de edifícios
      - "4110"  # Incorporação de empreendimentos imobiliários
      - "4212"  # Construção de ferrovias
      - "4221"  # Construção de redes (água, esgoto)
      - "4222"  # Construção de redes (eletricidade, telecom)
      - "4223"  # Construção de obras de arte especiais
      - "4291"  # Obras portuárias/marítimas
      - "4292"  # Montagem industrial
      - "4299"  # Outras obras de engenharia civil
      - "4311"  # Demolição
      - "4312"  # Preparação de terreno
      - "4313"  # Sondagem
      - "4319"  # Outros serviços especializados
      - "4391"  # Obras de fundações
      - "4399"  # Serviços especializados construção
      - "7112"  # Engenharia (escritórios)
      - "7119"  # Atividades técnicas (ensaios)

    sector_hints:
      - "construç"
      - "construc"
      - "edifici"
      - "obra"
      - "engenharia"
      - "paviment"
      - "infraestrutura"
      - "urbaniz"

    cnae_refinements:
      "4120":
        exclude_patterns:
          - "ponte"
          - "viaduto"
          - "passarela"
          - "barragem"
          - "reservatório"
          - "reservatorio"
          - "restauração de patrimônio"
          - "restauracao de patrimonio"
          - "restauração de fachada"
          - "restauracao de fachada"
          - "restauração de edifício"
          - "restauracao de edificio"
        extra_include:
          - "unidade habitacional"
          - "casa popular"
          - "habitação popular"
          - "habitacao popular"
          - "creche"
          - "escola"
          - "UBS"
          - "posto de saúde"
          - "posto de saude"
          - "centro esportivo"
          - "ginásio"
          - "ginasio"
          - "quadra coberta"
          - "quadra poliesportiva"
          - "prédio público"
