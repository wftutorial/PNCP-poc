name: squad-report-matching
version: "1.0"
description: >
  Squad para corrigir o algoritmo de correspondência edital↔histórico no pipeline
  /report-b2g. O sistema atual usa keywords por substring e não distingue NATUREZA
  do objeto (aquisição de materiais vs obra vs serviço). Resultado: distribuidora
  de insumos hospitalares recebe editais de construção de hospitais.

objective: >
  Fazer o collect-report-data.py gerar editais que correspondam ao que a empresa
  REALMENTE faz (baseado em contratos homologados), não apenas ao que o CNAE diz.
  A correção deve ser genérica — funcionar para qualquer CNPJ: distribuidoras,
  construtoras, empresas de TI, consultorias, etc.

agents:
  - role: architect
    focus: >
      Desenhar a taxonomia de natureza do objeto (AQUISICAO, OBRA, SERVICO,
      LOCACAO, CREDENCIAMENTO) e o algoritmo de classificação dual: classificar
      tanto os contratos históricos quanto os editais encontrados, rejeitando
      editais cuja natureza diverge do perfil histórico.

  - role: data-engineer
    focus: >
      Implementar as mudanças no collect-report-data.py: (1) classificar natureza
      dos contratos históricos, (2) derivar perfil de natureza da empresa,
      (3) filtrar editais por natureza compatível, (4) ajustar keyword extraction
      para ser context-aware.

  - role: dev
    focus: >
      Implementar mudanças no validate-report-data.py e generate-report-b2g.py
      para refletir a nova taxonomia. Ajustar gates de validação.

  - role: qa
    focus: >
      Testar com CNPJs de perfis diversos: distribuidora (2N Engenharia),
      construtora pura, empresa de TI, consultoria, empresa de alimentação.
      Validar que cada perfil recebe editais compatíveis.

workflow: bidiq-data-pipeline
priority: CRITICAL
estimated_effort: 2-3 sessions

problem_analysis:
  root_cause: >
    collect-report-data.py L2477-2486: filtragem de editais usa APENAS substring
    match no campo 'objeto' contra keywords do cluster. Não há distinção entre
    natureza do objeto (aquisição vs obra vs serviço). Uma keyword como "hospitalar"
    casa tanto com "aquisição de materiais hospitalares" quanto "construção de
    hospital".

  affected_functions:
    - name: cluster_contract_activities
      lines: "673-744"
      issue: "Classifica por prefixo, não distingue se contrato é de fornecimento ou obra"

    - name: _extract_keywords_flat
      lines: "751-885"
      issue: "Keywords extraídas sem contexto de natureza — 'hospitalar' sem 'aquisição'"

    - name: _parse_pncp_item
      lines: "2454-2545"
      issue: "Filtra apenas por keyword no objeto, sem validar natureza"

    - name: _modalidades_for_cluster
      lines: "907-928"
      issue: "Heurística por label do cluster, não por modalidades reais do histórico"

solution_design:
  principle: >
    Classificar a NATUREZA do objeto tanto nos contratos históricos quanto nos
    editais, e rejeitar editais cuja natureza diverge do perfil da empresa.
    A natureza é inferida do texto do objeto (não existe campo específico na API PNCP).

  steps:
    - id: S1
      name: "Taxonomia de natureza do objeto"
      description: >
        Criar classificador de natureza baseado em padrões textuais do campo 'objeto'.
        Categorias: AQUISICAO (compra de materiais/insumos), OBRA (construção/reforma/
        pavimentação), SERVICO (prestação de serviço contínuo), LOCACAO (aluguel),
        CREDENCIAMENTO (habilitação de prestadores), CONCESSAO, OUTRO.
      owner: architect

    - id: S2
      name: "Classificar natureza dos contratos históricos"
      description: >
        Aplicar classificador S1 aos 1000+ contratos do fornecedor PNCP durante
        cluster_contract_activities(). Registrar distribuição de natureza por cluster.
        Exemplo: cluster "Saúde" → 95% AQUISICAO, 3% SERVICO, 2% OBRA.
      owner: data-engineer
      depends: [S1]

    - id: S3
      name: "Derivar perfil de natureza da empresa"
      description: >
        A partir de S2, criar campo 'nature_profile' no JSON: {AQUISICAO: 85%,
        SERVICO: 10%, OBRA: 5%}. Este perfil determina que tipo de editais buscar.
        Threshold: naturezas com <5% do histórico são descartadas da busca.
      owner: data-engineer
      depends: [S2]

    - id: S4
      name: "Filtrar editais por natureza compatível"
      description: >
        Em _parse_pncp_item(), após keyword match, classificar natureza do edital
        e rejeitar se incompatível com nature_profile. Exemplo: empresa 85% AQUISICAO
        → edital de OBRA é rejeitado (salvo se empresa tem >5% de OBRA no histórico).
      owner: data-engineer
      depends: [S3]

    - id: S5
      name: "Keywords context-aware"
      description: >
        Ajustar _extract_keywords_flat() para gerar keywords com contexto de natureza.
        Em vez de "hospitalar" (ambíguo), gerar "aquisição hospitalar" ou
        "material hospitalar". Bigrams com verbo de aquisição/fornecimento têm
        prioridade para clusters de AQUISICAO.
      owner: data-engineer
      depends: [S1]

    - id: S6
      name: "Modalidades derivadas do histórico real"
      description: >
        Substituir heurística de _modalidades_for_cluster() por modalidades REAIS
        extraídas dos contratos históricos. Se 90% dos contratos vieram de Pregão
        Eletrônico, buscar editais nessa modalidade.
      owner: data-engineer
      depends: [S2]

    - id: S7
      name: "Atualizar validador e gerador"
      description: >
        validate-report-data.py: adicionar check de coerência natureza-edital.
        generate-report-b2g.py: exibir natureza no relatório, alertar divergências.
      owner: dev
      depends: [S4]

    - id: S8
      name: "Testes com CNPJs diversos"
      description: >
        Testar com pelo menos 4 perfis: (1) distribuidora de insumos (2N Engenharia),
        (2) construtora pura, (3) empresa de TI, (4) empresa de alimentação.
        Critério: >70% dos editais devem ter natureza compatível com histórico.
      owner: qa
      depends: [S4, S7]

files_affected:
  - scripts/collect-report-data.py  # Principal — clustering, keywords, filtering
  - scripts/validate-report-data.py  # Gate determinístico
  - scripts/generate-report-b2g.py  # PDF generator
  - .claude/commands/report-b2g.md  # Documentação do comando
