bundle:
  name: "Intel B2G — Mapeamento de Leads por Setor"
  icon: "\U0001F50D"
  version: "1.0"
  description: |
    Squad de inteligencia competitiva B2G. Faz varredura multi-fonte
    (PNCP contratos + OpenCNPJ + Portal da Transparencia) para mapear
    TODOS os players ativos de um setor, consolidando dados cadastrais,
    operacionais e de contato em um relatorio estruturado de leads.

    DIFERENCA DO ATAQUE TURBO: Intel B2G MAPEIA (volume, cobertura,
    dados completos). Ataque Turbo PROSPECTA (qualifica, pontua, gera
    emails). Intel B2G alimenta o Ataque Turbo com leads pre-mapeados.

    INVOCACAO: /intel-b2g leads de {setor}
    EXEMPLO: /intel-b2g leads de medicamentos

agents:
  - data-engineer  # Lead: pipeline PNCP + OpenCNPJ + Portal Transparencia
  - analyst        # Cruzamento, dedup, estimativa de faturamento, decisor
  - dev            # Execucao de curl, web search, processamento de dados
  - architect      # Rate limiting, cache, resiliencia do pipeline

workflows:
  - intel-b2g-leads

tasks:
  - intel-b2g-leads.md

references:
  - backend/sectors_data.yaml                          # 15 setores com keywords
  - backend/search_pipeline.py                         # _build_pncp_link()
  - .aios-core/development/tasks/acha-leads.md         # Workflow irmao (prospeccao)
  - .aios-core/development/agent-teams/squad-ataque-turbo.yaml  # Squad downstream

# ===================================================================
# SCHEMA DE SAIDA — CADA LEAD TEM ESSES CAMPOS
# ===================================================================

output_schema:
  lead:
    empresa:              # Razao social (OpenCNPJ)
    nome_fantasia:        # Nome fantasia (OpenCNPJ)
    cnpj:                 # CNPJ formatado
    cidade_sede:          # Municipio + UF da sede (OpenCNPJ)
    setor_atuacao:        # CNAE principal descricao (OpenCNPJ)
    cnaes_secundarios:    # Lista de CNAEs secundarios relevantes
    estados_atuacao:      # UFs onde ganhou contratos (PNCP agregado)
    cidades_atuacao:      # Municipios dos orgaos contratantes (PNCP)
    faturamento_gov_mensal: # Media mensal de contratos publicos (PNCP + PT)
    capital_social:       # Capital social registrado (OpenCNPJ)
    porte:                # MEI/ME/EPP/DEMAIS (OpenCNPJ)
    website:              # Site da empresa (OpenCNPJ ou web search)
    telefones:            # Lista com DDD+numero, flag whatsapp (OpenCNPJ)
    email:                # Email de contato (OpenCNPJ)
    decisor_nome:         # Socio-administrador do QSA (OpenCNPJ)
    decisor_cargo:        # Qualificacao do socio (ex: Socio-Administrador)
    contratos_recentes:   # Qtd de contratos nos ultimos 12 meses
    valor_total_contratos: # Soma dos contratos no periodo
    orgaos_contratantes:  # Lista de orgaos (top 5)
    sancoes:              # true/false (Portal da Transparencia)
    fonte_dados:          # Fontes usadas (pncp, opencnpj, portal_transparencia)
    data_coleta:          # Timestamp da coleta

# ===================================================================
# FORMATO DE SAIDA
# ===================================================================

output:
  file_pattern: "docs/intel-b2g/leads-{setor}-{YYYY-MM-DD}.md"
  sections:
    - resumo_executivo    # Total leads, cobertura UF, valor agregado
    - tabela_leads        # Tabela markdown com todos os campos
    - metodologia         # Fontes, periodo, filtros aplicados
    - proximos_passos     # Sugestao de filtros para Ataque Turbo

# ===================================================================
# APIs — REFERENCIA TECNICA
# ===================================================================

api_reference:
  pncp_contratos:
    description: "Fonte primaria — contratos publicados (vencedores)"
    endpoint: "https://pncp.gov.br/api/consulta/v1/contratos"
    max_page_size: 500
    date_format: "YYYYMMDD"
    key_fields:
      - niFornecedor          # CNPJ do fornecedor (chave de cruzamento)
      - nomeRazaoSocialFornecedor
      - objetoContrato
      - valorGlobal
      - orgaoEntidade.razaoSocial
      - orgaoEntidade.cnpj
      - unidadeOrgao.ufSigla
      - unidadeOrgao.municipioNome
      - dataAssinatura
    notes: |
      - tamanhoPagina=500 funciona (diferente de /contratacoes que e max 50)
      - Timeouts frequentes em pages >3 — usar timeout 30s + retry
      - NAO existe filtro por cnpjFornecedor — filtrar client-side
      - Filtrar por keywords no objetoContrato para isolar setor
      - Periodo recomendado: 6-12 meses para volume significativo

  pncp_resultados:
    description: "Resultados/vencedores de itens homologados"
    endpoint: "https://pncp.gov.br/api/pncp/v1/orgaos/{CNPJ}/compras/{ANO}/{SEQ}/itens/{ITEM}/resultados"
    key_fields:
      - niFornecedor
      - nomeRazaoSocialFornecedor
      - valorTotalHomologado
      - porteFornecedorNome

  opencnpj:
    description: "Enriquecimento cadastral — dados da Receita Federal"
    endpoint: "https://api.opencnpj.org/{CNPJ_SEM_PONTUACAO}"
    rate_limit: "50 req/s (sem auth)"
    key_fields:
      - razao_social, nome_fantasia
      - cnae_principal (codigo + descricao)
      - cnaes_secundarios (lista de strings)
      - capital_social (string com virgula — ex "1232000,00")
      - porte (MEI/ME/EPP/DEMAIS)
      - logradouro, municipio, uf, cep
      - email
      - telefones (lista de dicts com ddd/numero/is_fax)
      - QSA (uppercase — lista de socios com nome e qualificacao)
      - situacao_cadastral
    notes: |
      - capital_social e STRING com virgula ("1232000,00") — converter float
      - QSA (uppercase, nao qsa) — lista de dicts com nome_socio e qualificacao
      - cnaes_secundarios e lista de STRINGS (nao dicts)
      - telefones: [{ddd, numero, is_fax}] — numero sem DDD
      - Fallback: BrasilAPI (3-5 req/s) em caso de falha

  portal_transparencia:
    description: "Check de sancoes + historico de contratos federais"
    endpoint_sancoes: "https://api.portaldatransparencia.gov.br/api-de-dados/pessoa-juridica?cnpj={CNPJ}"
    endpoint_contratos: "https://api.portaldatransparencia.gov.br/api-de-dados/contratos/cpf-cnpj?cpfCnpj={CNPJ}"
    auth: "Header chave-api-dados: $PORTAL_TRANSPARENCIA_API_KEY"
    rate_limit: "90 req/min (06h-01h), 450 req/min (01h-06h)"
    key_fields:
      - sancionadoCEIS, sancionadoCNEP, sancionadoCEPIM, sancionadoCEAF  # booleans
      - possuiContratacao, participanteLicitacao
      - contratos: objeto, valorInicialCompra, valorFinalCompra, dataAssinatura
    notes: |
      - Token ja configurado em backend/.env (PORTAL_TRANSPARENCIA_API_KEY)
      - Se QUALQUER sancao = true → DESCARTAR lead
      - Endpoint /contratos/cpf-cnpj e dedicado por fornecedor (nao precisa codigoOrgao)

# ===================================================================
# PIPELINE DE EXECUCAO
# ===================================================================

pipeline:
  step_1_coleta:
    agent: data-engineer
    action: "Buscar contratos PNCP por keywords do setor (6-12 meses)"
    output: "Lista de CNPJs unicos de fornecedores vencedores"
    details: |
      1. Carregar keywords do setor em backend/sectors_data.yaml
      2. Buscar PNCP /contratos com periodo de 6-12 meses
      3. Filtrar objetoContrato por keywords (case-insensitive, match parcial)
      4. Extrair CNPJs unicos de niFornecedor
      5. Agregar por CNPJ: qtd contratos, valor total, UFs, orgaos, municipios
      6. Dedup por CNPJ (mesmo fornecedor pode ter multiplos contratos)

  step_2_enriquecimento:
    agent: data-engineer
    action: "Enriquecer cada CNPJ via OpenCNPJ + Portal da Transparencia"
    output: "Perfis completos com dados cadastrais e sancoes"
    details: |
      Para cada CNPJ unico:
      1. OpenCNPJ → dados cadastrais completos
      2. Portal Transparencia /pessoa-juridica → check sancoes (1 call)
      3. Portal Transparencia /contratos/cpf-cnpj → historico federal (1 call)
      4. DESCARTAR se situacao_cadastral != ATIVA
      5. DESCARTAR se qualquer sancao = true
      6. Calcular faturamento_gov_mensal = soma_contratos / meses_do_periodo

  step_3_decisor:
    agent: analyst
    action: "Identificar decisor a partir do QSA"
    output: "Nome e cargo do decisor para cada lead"
    details: |
      Prioridade de selecao no QSA:
      1. Socio-Administrador (qualificacao 49)
      2. Administrador (qualificacao 05)
      3. Diretor (qualificacao 10)
      4. Presidente (qualificacao 16)
      5. Socio (qualificacao 22) — ultimo recurso
      Se QSA vazio: decisor_nome = "N/D", decisor_cargo = "N/D"

  step_4_contato:
    agent: dev
    action: "Buscar website, validar telefones, identificar WhatsApp"
    output: "Dados de contato enriquecidos"
    details: |
      1. Website: campo do OpenCNPJ, ou web search "{nome_fantasia} site oficial"
      2. Telefones: OpenCNPJ telefones[] — celular (9XXXX) = provavel WhatsApp
      3. Email: OpenCNPJ email (pode ser generico)
      4. Web search complementar se email/telefone vazios
      Heuristica WhatsApp:
        - DDD + 9XXXX-XXXX = celular = flag whatsapp=true
        - DDD + [2-5]XXX-XXXX = fixo = whatsapp=false

  step_5_consolidacao:
    agent: analyst
    action: "Consolidar, ordenar por faturamento gov, gerar relatorio"
    output: "docs/intel-b2g/leads-{setor}-{data}.md"
    details: |
      1. Ordenar leads por faturamento_gov_mensal (desc)
      2. Gerar resumo executivo (total leads, cobertura UF, valor agregado)
      3. Gerar tabela markdown com todos os campos do output_schema
      4. Incluir metodologia (fontes, periodo, filtros)
      5. Sugerir proximos passos (filtrar por UF, rodar Ataque Turbo)

# ===================================================================
# LIMITES E PROTECOES
# ===================================================================

limits:
  max_cnpjs_per_run: 200          # Alem disso, paginar em batches
  opencnpj_rate: "50/s"           # Generoso, mas respeitar
  portal_transparencia_rate: "90/min"  # 2 calls por CNPJ = 45 CNPJs/min
  timeout_per_request: 30         # segundos
  retry_max: 3                    # tentativas por request
  retry_backoff: [1, 3, 10]       # segundos entre retries
  periodo_padrao_meses: 6         # default se nao especificado
  max_periodo_meses: 12           # alem disso, timeouts frequentes
