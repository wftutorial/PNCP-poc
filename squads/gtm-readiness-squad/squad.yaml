name: gtm-readiness-squad
version: 1.0.0
description: >
  Squad ultra-completo para auditoria de prontidão Go-To-Market do SmartLic.
  Cobre 10 trilhas paralelas: infraestrutura, autenticação, billing, pipeline de busca,
  UX/produto, performance, observabilidade, mercado, conteúdo/comunicação e compliance.
  Gera scorecard executivo com go/no-go decision e plano de remediação priorizado.
author: Tiago Sasaki
license: MIT
slashPrefix: gtm-readiness

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - gtm-orchestrator.md
    - infra-auditor.md
    - security-auditor.md
    - billing-auditor.md
    - pipeline-auditor.md
    - ux-auditor.md
    - performance-auditor.md
    - observability-auditor.md
    - market-analyst.md

  tasks:
    # ═══════════════════════════════════════════
    # TRACK 0: Orchestration & Scorecard
    # ═══════════════════════════════════════════
    - kickoff-gtm-audit.md
    - compile-scorecard.md
    - generate-go-nogo-verdict.md
    - create-remediation-plan.md

    # ═══════════════════════════════════════════
    # TRACK 1: Infrastructure & Platform (infra-auditor)
    # ═══════════════════════════════════════════
    - audit-railway-config.md
    - audit-supabase-health.md
    - audit-redis-resilience.md
    - audit-dns-ssl-csp.md
    - audit-ci-cd-pipeline.md
    - audit-env-vars-secrets.md

    # ═══════════════════════════════════════════
    # TRACK 2: Authentication & Security (security-auditor)
    # ═══════════════════════════════════════════
    - audit-jwt-auth.md
    - audit-rls-policies.md
    - audit-cve-dependencies.md
    - audit-lgpd-compliance.md
    - audit-input-validation.md
    - audit-secrets-rotation.md

    # ═══════════════════════════════════════════
    # TRACK 3: Billing & Monetization (billing-auditor)
    # ═══════════════════════════════════════════
    - audit-stripe-integration.md
    - audit-payment-methods.md
    - audit-trial-conversion.md
    - audit-pricing-strategy.md
    - audit-webhook-reliability.md

    # ═══════════════════════════════════════════
    # TRACK 4: Search Pipeline Resilience (pipeline-auditor)
    # ═══════════════════════════════════════════
    - audit-pncp-client.md
    - audit-pcp-client.md
    - audit-comprasgov-client.md
    - audit-circuit-breakers.md
    - audit-cache-cascade.md
    - audit-llm-classification.md

    # ═══════════════════════════════════════════
    # TRACK 5: UX & Product Quality (ux-auditor)
    # ═══════════════════════════════════════════
    - audit-search-ux-flow.md
    - audit-progress-feedback.md
    - audit-error-states.md
    - audit-onboarding-flow.md
    - audit-mobile-responsive.md

    # ═══════════════════════════════════════════
    # TRACK 6: Performance & Scalability (performance-auditor)
    # ═══════════════════════════════════════════
    - audit-search-latency.md
    - audit-concurrent-load.md
    - audit-llm-throughput.md
    - audit-frontend-vitals.md

    # ═══════════════════════════════════════════
    # TRACK 7: Observability & Monitoring (observability-auditor)
    # ═══════════════════════════════════════════
    - audit-prometheus-metrics.md
    - audit-sentry-coverage.md
    - audit-otel-tracing.md
    - audit-alerting-runbooks.md

    # ═══════════════════════════════════════════
    # TRACK 8: Market & Competitive (market-analyst)
    # ═══════════════════════════════════════════
    - audit-competitive-positioning.md
    - audit-feature-gap-analysis.md
    - audit-social-proof.md
    - audit-acquisition-readiness.md

    # ═══════════════════════════════════════════
    # CHECKPOINTS
    # ═══════════════════════════════════════════
    - checkpoint-blockers-resolved.md
    - checkpoint-all-tracks-complete.md

  workflows:
    - full-gtm-audit-workflow.md
    - quick-gtm-healthcheck-workflow.md

  checklists:
    - go-nogo-checklist.md
    - security-compliance-checklist.md
    - ux-production-checklist.md

  templates:
    - scorecard-template.md
    - remediation-plan-template.md

  tools: []
  scripts: []

config:
  extends: extend
  coding-standards: ../../docs/framework/coding-standards.md
  tech-stack: ../../docs/framework/tech-stack.md
  source-tree: ../../docs/framework/source-tree.md

dependencies:
  node: []
  python:
    - pytest>=7.0.0
    - httpx>=0.24.0
    - stripe>=11.0.0
  squads: []

tags:
  - gtm
  - readiness
  - audit
  - production
  - go-to-market
  - quality-gate
  - full-stack
  - compliance
  - performance
  - security
  - billing
  - custom

metadata:
  audit_dimensions: 10
  total_agents: 9
  total_tasks: 46
  total_workflows: 2
  total_checklists: 3
  estimated_duration: "3-5 days (full audit), 4h (quick healthcheck)"
  complexity: "very-high"
  risk_level: "high"
  scoring_model: "weighted 10-dimension, 100-point scale"
  baseline_date: "2026-02-26"
  project_version: "v0.5 POC Avançado"
  production_url: "https://smartlic.tech"

blueprint:
  source:
    - docs/summaries/gtm-resilience-summary.md
    - docs/summaries/gtm-fixes-summary.md
    - ROADMAP.md
    - PRD.md
  created_at: "2026-02-26T00:00:00Z"
  confidence: 0.95
