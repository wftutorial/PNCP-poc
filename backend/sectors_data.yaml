    # CRIT-FLT-007: Co-occurrence rules for materiais_hidraulicos
    co_occurrence_rules:
      # Rule 1: "tubo" in non-plumbing context (medical, musical, structural)
      - trigger: "tubo"
        negative_contexts:
          - "ensaio"
          - "laboratorio"
          - "coleta"
          - "sangue"
          - "oxigenio"
        positive_signals:
          - "pvc"
          - "hidraulico"
          - "esgoto"
          - "agua"
      # Rule 2: "bomba" in non-hydraulic context (explosive, cosmetic)
      - trigger: "bomba"
        negative_contexts:
          - "incendio"
          - "combustivel"
          - "gasolina"
          - "cosmetico"
        positive_signals:
          - "agua"
          - "submersa"
          - "centrifuga"
          - "poco"
