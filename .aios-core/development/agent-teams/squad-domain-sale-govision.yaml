bundle:
  name: "Domain Sale Acceleration — govision.ai"
  icon: "\U0001F4B5"
  description: >
    Squad tatico para acelerar a venda do dominio govision.ai no Sedo.com.
    Missao: converter o dominio em cash no menor prazo possivel.
    Walk-away price: $1,000-$4,000 USD (R$5k-R$20k).
    Current ask: $35,000. Listado 3-12 meses sem tração.

mode: advisory  # Read-only — never modifies code

context:
  domain: govision.ai
  current_marketplace: Sedo.com
  asking_price: $35,000
  walk_away_price: $1,000-$4,000 USD
  time_listed: 3-12 months
  urgency: critical (financial emergency)
  market_conditions: .AI domains hot — 20-30% annual price growth, AI.com sold $70M Feb 2026
  comparable_sales:
    - Surface.ai: $110,000
    - Climb.ai: $100,000
    - Enclave.ai: $100,000
    - vision keyword: premium (Google Vision AI, computer vision sector)

clusters:
  - name: Pricing Strategist
    icon: "\U0001F3F7\uFE0F"
    perspective: >
      Domain pricing psychology, anchoring, BIN vs auction vs make-offer,
      price reduction tactics, urgency creation, market-based valuation.
    action: Determine optimal pricing strategy for fastest sale

  - name: Multi-Platform Distribution
    icon: "\U0001F310"
    perspective: >
      Marketplace selection (Sedo, Afternic, Atom, Spaceship, Dan.com, Efty),
      cross-listing strategy, landing page optimization, SedoMLS,
      registrar distribution networks.
    action: Maximize exposure across all viable platforms

  - name: Direct Outreach & End-User Targeting
    icon: "\U0001F3AF"
    perspective: >
      Identify companies/startups that would want "govision" as brand,
      computer vision companies, GoVision existing brands,
      AI startups looking for premium domains.
    action: Build target list for direct outreach

  - name: Auction & Urgency Tactics
    icon: "\u23F0"
    perspective: >
      Sedo featured auctions, time-limited offers, domain broker services,
      social proof, domain community promotion (NamePros, DNForum).
    action: Create urgency and competitive pressure

output_format: |
  ## Squad Output: govision.ai Sale Acceleration Plan

  ### Pricing Strategy
  [Optimal price points, BIN vs auction decision]

  ### Multi-Platform Listing Plan
  [Which platforms, in what order, with what settings]

  ### Direct Outreach Targets
  [Companies to contact directly, with scripts]

  ### Timeline & Milestones
  [Week-by-week action plan]

  ### Estimated Outcome
  [Realistic price range and timeline]

notes:
  - This is TACTICAL — optimize for speed, not maximum price
  - Walk-away at $1,000 is acceptable in emergency
  - .AI market is hot RIGHT NOW — timing advantage
  - govision = "go" + "vision" — strong AI semantics
  - Renewal cost matters — if domain renewal is coming, factor into urgency
