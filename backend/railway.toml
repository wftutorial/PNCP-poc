# =============================================================================
# BidIQ Uniformes - Backend Railway Configuration
# =============================================================================
# Service: bidiq-backend
# Framework: FastAPI + Python 3.11
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
# NOTE: Using Dockerfile CMD instead of startCommand for proper $PORT expansion
# startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Zero-downtime: keep old container running 30s after new one is healthy
# (longer than frontend — SSE streams + search requests need time to drain)
overlapSeconds = "30"
# Graceful shutdown: 15s for in-flight SSE/search requests after SIGTERM
drainingSeconds = "15"

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - OPENAI_API_KEY (Get from https://platform.openai.com/api-keys)
#   - PORT (Auto-injected by Railway)
#
# OPTIONAL (with defaults):
#   - LOG_LEVEL=INFO
#   - PNCP_TIMEOUT=30
#   - PNCP_MAX_RETRIES=5
# =============================================================================
