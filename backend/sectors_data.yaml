    # GTM-RESILIENCE-D03: Co-occurrence rules for false positive detection.
    # Each rule: trigger keyword + negative_contexts (reject) + positive_signals (rescue).
    # If trigger matches AND any negative_context matches AND NO positive_signal matches → REJECT.
    # To add rules for other sectors, copy this structure with sector-specific terms.
    co_occurrence_rules:
      # Rule 1: "uniform*" + construction/renovation context
      - trigger: "uniform"
        negative_contexts:
          - "fachada"
          - "pintura"
          - "reforma"
          - "revestimento"
        positive_signals:
          - "textil"
          - "epi"
          - "costura"
          - "tecido"
      # Rule 2: "uniform*" + process/regulation context
      - trigger: "uniform"
        negative_contexts:
          - "procedimento"
          - "processo"
          - "norma"
          - "regulamento"
          - "protocolo"
        positive_signals:
          - "vestimenta"
          - "roupa"
          - "fardamento"
      # Rule 3: "uniform*" + visual identity/branding context
      - trigger: "uniform"
        negative_contexts:
          - "identidade visual"
          - "comunicacao visual"
          - "sinalizacao"
        positive_signals:
          - "camisa"
          - "camiseta"
          - "jaleco"
      # Rule 4: "uniform*" + events/entertainment context (ISSUE-029 session-017)
      - trigger: "uniform"
        negative_contexts:
          - "bilheteria"
          - "ingressos"
          - "espetaculo"
          - "espetáculos"
          - "eventos"
          - "teatro"
          - "show"
        positive_signals:
          - "fardamento"
          - "vestimenta"
          - "kit uniforme"
          - "aquisicao de uniforme"
      # Rule 5: "costura" + non-clothing items
      - trigger: "costura"
        negative_contexts:
          - "cortina"
          - "estofado"
          - "tapecaria"
          - "bandeira"
          - "toldo"
        positive_signals:
          - "uniforme"
          - "roupa"
          - "vestimenta"
      # Rule 5: Removed — "padronizacao" trigger had no matching keyword prefix.
      # False positives covered by exclusions: "padronizacao de uniforme escolar".
          - "textil"
          - "confeccao"
    # GTM-RESILIENCE-D01 AC4: Domain signals for item-level inspection
    domain_signals:
