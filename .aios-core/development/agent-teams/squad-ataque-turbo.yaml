bundle:
  name: Ataque Turbo — Prospecção Cirúrgica com Licitações Reais
  icon: "\U0001F4A5"
  version: "4.0"
  description: |
    Squad de prospecção ativa que cruza dados reais de MÚLTIPLAS fontes
    públicas de licitações (PNCP, ComprasGov, Portal da Transparência,
    Compras.dados.gov.br) com perfis de empresas vencedoras frequentes
    para gerar cadências multi-touch com oportunidades irresistíveis.

    CADÊNCIA 4-TOUCH + LINKEDIN: Cada lead recebe sequência de 4 emails
    em 14 dias (D0, D3, D7, D14) + conexão LinkedIn (D5). CTA progressivo:
    Email 1 = soft (interesse), Email 2 = valor + preço, Email 3 = urgência,
    Email 4 = breakup. NUNCA preço no primeiro contato.

    INFRAESTRUTURA DE DELIVERABILITY: Domínio dedicado para outreach
    (outreach.confenge.com.br) com SPF+DKIM+DMARC p=reject. Warmup de
    14-21 dias. Max 20 emails/inbox/dia. Sem isso, emails vão para spam.

    PRINCÍPIO FUNDAMENTAL: Qualidade > Quantidade. Cada lead recebe
    investigação nível CSI — cruzamento profundo entre histórico de
    vitórias, perfil empresarial e editais abertos no momento.

    CRITÉRIO DE IMPACTO: Ao receber o email, o lead deve pensar
    "CARALHO, como não conheci esse cara antes?!" — se o email não
    causa esse efeito visceral, a investigação e o texto são inadequados.

    ESTÁGIO DO PRODUTO: SmartLic.tech está em preparativos finais antes
    do lançamento oficial. O algoritmo de busca e classificação está
    validado e operacional. Assinaturas NÃO devem ser incentivadas.
    O valor entregue é o relatório de oportunidades (produto-serviço).

    COMPLIANCE LGPD: Dados de portais públicos de contratações (PNCP,
    Lei 14.133/2021) = base jurídica forte (legítimo interesse, Art. 10).
    Todo email DEVE incluir opt-out ("responda remover") e fonte dos dados.

agents:
  - analyst        # Lead: qualificação de leads, decisão de fração grátis, pricing, investigação de perfil
  - data-engineer  # PNCP + Receita Federal API queries, agregação, cruzamento de dados
  - dev            # Executar curl commands, processar dados, gerar arquivos de saída
  - po             # Personalização de emails, proposta de valor, CTA, alinhamento com copy do site

workflows:
  - acha-leads (Lean mode, sem OpenAI API)

tasks:
  - acha-leads.md

references:
  - docs/sessions/2026-02/turbocash.md                # Playbook de monetização + pipeline de leads
  - .aios-core/development/tasks/acha-leads.md         # Workflow de prospecção buy-intent
  - frontend/app/page.tsx                              # Landing page — tom e copy de referência
  - frontend/lib/value-propositions.ts                 # Biblioteca de proposições de valor
  - backend/search_pipeline.py                         # _build_pncp_link() para links de editais
  - backend/sectors_data.yaml                          # 15 setores com keywords

