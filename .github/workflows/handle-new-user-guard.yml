name: handle_new_user Guard
on:
  pull_request:
    paths:
      - 'supabase/migrations/**'

permissions:
  pull-requests: write

jobs:
  check-handle-new-user:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for handle_new_user modifications
        id: check
        run: |
          # Get changed migration files
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'supabase/migrations/')
          if [ -z "$CHANGED" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any changed file references handle_new_user
          MATCHES=$(echo "$CHANGED" | xargs grep -l "handle_new_user" 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "files=$MATCHES" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Post warning comment
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **Migration Guard (DEBT-002)**: This PR modifies the \`handle_new_user\` trigger function.\n\nThis function is **CRITICAL** for the user signup flow — if broken, new users cannot create accounts.\n\n**Files detected:**\n\`\`\`\n${process.env.MATCHES || 'unknown'}\n\`\`\`\n\n**Required:** Review by database team before merge.\n\nSee **DEBT-002** for full context on this guard.`
            })
        env:
          MATCHES: ${{ steps.check.outputs.files }}
