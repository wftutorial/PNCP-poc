# ============================================================
# Design Tokens — Relatório B2G Premium
# Estética: Big Four / Management Consulting (McKinsey, BCG, Deloitte)
#
# Princípios:
#   1. Restraint — menos é mais; cada elemento visual deve justificar sua presença
#   2. Gravitas — tipografia serif para autoridade; sans-serif apenas para dados
#   3. Whitespace — margens generosas, espaçamento entre seções
#   4. Monocromia — paleta de 3 cores + escala de cinzas
#   5. Tabelas abertas — regras horizontais apenas (topo/base), sem grid
#   6. Sem decoração — sem emojis, ícones, progress bars, cards coloridos
# ============================================================

# --- Paleta Cromática (máximo 5 cores) ---
colors:
  # Primárias
  ink:           "#1B2A3D"    # Charcoal navy — títulos, ênfase forte
  accent:        "#8B7355"    # Warm bronze — filetes, destaques sutis
  signal_red:    "#B5342A"    # Muted red — apenas alertas críticos

  # Escala de cinzas (corpo de texto, linhas, fundos)
  text:          "#2D3748"    # Body text
  text_secondary: "#5A6577"  # Subtítulos, labels, captions
  text_muted:    "#8896A6"   # Notas de rodapé, metadata
  rule:          "#C8CDD3"   # Linhas horizontais de tabela
  rule_heavy:    "#4A5568"   # Regra grossa (topo de tabela)
  bg_subtle:     "#F5F6F8"   # Fundo sutil (raro — apenas ficha técnica)
  white:         "#FFFFFF"

# --- Tipografia ---
# ReportLab built-in fonts: Times-Roman, Times-Bold, Helvetica, Helvetica-Bold
typography:
  # Hierarchy: 4 níveis apenas
  cover_title:
    font: Times-Bold
    size: 26
    color: ink
    leading: 32
    align: left      # Big Four = left-aligned titles, not centered

  cover_subtitle:
    font: Times-Roman
    size: 14
    color: text_secondary
    leading: 18

  h1:
    font: Times-Bold
    size: 14
    color: ink
    leading: 18
    space_before: 8mm
    space_after: 4mm

  h2:
    font: Times-Bold
    size: 11
    color: ink
    leading: 14
    space_before: 5mm
    space_after: 3mm

  h3:
    font: Times-Bold
    size: 10
    color: text
    leading: 13
    space_before: 3mm
    space_after: 2mm

  body:
    font: Times-Roman
    size: 10
    color: text
    leading: 14
    align: justify

  body_small:
    font: Times-Roman
    size: 9
    color: text_secondary
    leading: 12

  caption:
    font: Helvetica
    size: 7
    color: text_muted
    leading: 9

  # Dados tabulares — sans-serif para clareza
  table_header:
    font: Helvetica-Bold
    size: 8
    color: ink
    leading: 10

  table_cell:
    font: Helvetica
    size: 8
    color: text
    leading: 10

  table_cell_bold:
    font: Helvetica-Bold
    size: 8
    color: text
    leading: 10

  metric_value:
    font: Times-Bold
    size: 18
    color: ink
    leading: 22

  metric_label:
    font: Helvetica
    size: 7
    color: text_muted
    leading: 9

# --- Layout ---
layout:
  page: A4
  margin: 2.2cm          # Ligeiramente maior que o anterior (2cm)
  bottom_extra: 10mm     # Espaço extra para footer

  # Espaçamentos verticais
  section_gap: 10mm      # Entre seções principais
  subsection_gap: 5mm    # Entre sub-seções
  element_gap: 3mm       # Entre elementos dentro de seção
  table_after: 6mm       # Após tabelas

# --- Tabelas (estilo "three-rule") ---
tables:
  # Regra grossa no topo, hairline entre rows, regra média na base
  top_rule: 1.2          # pt — linha superior
  bottom_rule: 0.8       # pt — linha inferior
  inner_rule: 0.3        # pt — entre linhas (hairline)
  top_rule_color: rule_heavy
  bottom_rule_color: rule
  inner_rule_color: rule

  header_bg: none        # SEM fundo colorido no header
  alt_row_bg: none       # SEM zebra striping
  cell_padding_v: 4      # pt vertical
  cell_padding_h: 5      # pt horizontal

# --- Indicadores de Recomendação (sem cores fortes) ---
recommendation:
  # Texto tipográfico ao invés de badges coloridos
  participar:
    prefix: "PARTICIPAR"
    color: ink           # Preto bold — ação clara
    weight: bold
  avaliar:
    prefix: "AVALIAR"
    color: text_secondary
    weight: bold
  nao_recomendado:
    prefix: "NÃO RECOMENDADO"
    color: signal_red
    weight: bold

# --- Viabilidade (textual, sem barra) ---
viability:
  display: text          # "text" em vez de "bar"
  format: "{score}/100 — {qualification}"
  qualifications:
    high: "Viabilidade Alta"     # >= 60
    moderate: "Viabilidade Moderada"  # 30-59
    low: "Viabilidade Baixa"     # < 30

# --- Footer institucional ---
footer:
  line1: "Tiago Sasaki — Consultor de Inteligência em Licitações"
  line2: "Relatório confidencial preparado exclusivamente para o destinatário"
  font: Helvetica
  size: 7
  color: text_muted
  rule_weight: 0.4
  rule_color: rule

# --- Cover ---
cover:
  top_margin: 80mm       # Espaço generoso antes do título
  rule_weight: 0.8       # Filete fino
  rule_color: accent     # Bronze
  rule_width: 40mm       # Comprimento do filete (curto, elegante)
  attribution: "Tiago Sasaki — Consultor de Inteligência em Licitações | (48) 9 8834-4559"

# --- Source confidence (textual) ---
source_badges:
  API:          { symbol: "Confirmado",       color: text }
  CALCULATED:   { symbol: "Calculado",        color: text }
  API_PARTIAL:  { symbol: "Parcial",          color: text_secondary }
  ESTIMATED:    { symbol: "Estimado",         color: text_secondary }
  API_FAILED:   { symbol: "Indisponível",     color: signal_red }
  UNAVAILABLE:  { symbol: "Não disponível",   color: text_muted }
