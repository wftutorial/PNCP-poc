# =============================================================================
# BidIQ Uniformes - Frontend Railway Configuration
# =============================================================================
# Service: bidiq-frontend
# Framework: Next.js 16 + React 18
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Zero-downtime: keep old container running 15s after new one is healthy
overlapSeconds = 15
# Graceful shutdown: 10s for in-flight requests after SIGTERM
drainingSeconds = 10

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - BACKEND_URL (Runtime URL of backend service, e.g. https://bidiq-backend.up.railway.app)
#   - PORT (Auto-injected by Railway)
# =============================================================================
