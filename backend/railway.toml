# =============================================================================
# SmartLic - Backend Railway Configuration
# =============================================================================
# Service: smartlic-backend
# Framework: FastAPI + Python 3.12
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
# CRIT-SIGSEGV-FIX: Force uvicorn standalone (no Gunicorn fork) to eliminate SIGSEGV
# caused by cryptography C extensions in forked workers.
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --timeout-keep-alive 75 --workers ${WEB_CONCURRENCY:-2}'"
healthcheckPath = "/health/ready"
# SLA-001 + STORY-303 AC6: 300s grace period for cold starts.
# Without --preload (STORY-303), each worker loads 65+ modules independently (~5-15s).
# Railway won't route traffic until /health/ready returns 200, preventing CRIT-010 404s.
# Combined with main.py lifespan gate (ready:false until startup complete).
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# SLA-001: 10 retries before giving up (was 3 — too aggressive for transient OOM)
restartPolicyMaxRetries = 10
# SLA-001: 45s overlap for zero-downtime deploys (SSE streams + long-running searches)
overlapSeconds = 45
# GTM-INFRA-002 AC4: 120s drain aligned with Railway hard timeout
# Prevents killing in-flight searches during deploys (was 30s)
drainingSeconds = 120

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - OPENAI_API_KEY (Get from https://platform.openai.com/api-keys)
#   - PORT (Auto-injected by Railway)
#
# OPTIONAL (with defaults):
#   - LOG_LEVEL=INFO
#   - PNCP_TIMEOUT=30
#   - PNCP_MAX_RETRIES=5
# =============================================================================
