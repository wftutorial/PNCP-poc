# =============================================================================
# LLM Fallback Configuration
# When map_sector() returns "Geral" (unknown CNAE), the LLM classifies
# edital relevance using the company's CNAE description as context.
# =============================================================================
llm_fallback:
  enabled: true
  model: "gpt-4.1-nano"
  max_concurrent: 5
  timeout_s: 10
  # Fallback = REJECT on LLM failure (zero noise philosophy)
  on_failure: "reject"
  # Prompt template: {cnae_description} and {objeto} are interpolated
  prompt_template: |
    Você é um classificador de licitações públicas brasileiras.

    A empresa tem o seguinte CNAE: {cnae_description}

    O edital tem o seguinte objeto: {objeto}

    O edital é relevante para uma empresa com esse CNAE?
    Responda APENAS "SIM" ou "NAO" (sem acentos, sem explicação).
