activation: |
  Para ativar este squad:
  1. /squad-creator → carregar squad-ataque-turbo
  2. Ou direto: *acha-leads --mode lean
  3. Output: docs/ataque-turbo-NNN.md

notes:
  - "Modelo inspirado no TurboCash playbook (Ação 1 + Ação 2)"
  - "Preço referência: R$1.500 a R$3.000 — ajustável pelo @analyst"
  - "Cadência 4-touch + LinkedIn: D0 (email soft), D3 (email valor+preço), D5 (LinkedIn), D7 (email urgência), D14 (email breakup)"
  - "Meta: investigação CSI multi-fonte → cadência irresistível → reação 'CARALHO' → conversão"
  - "Após 3 runs com >=15% response rate, graduar para Scale mode"
  - "Público expandido: consultorias (turbocash) + empresas B2G diretas"
  - "Fontes: PNCP (primária), TCU (qualificação+contratos, sem auth), ComprasGov v3 (⚠️ 404, investigar), Portal da Transparência (API key), Compras.dados.gov.br (legacy)"
  - "Faturamento inferido via: porte + capital_social + volume TOTAL de contratos (cross-source)"
  - "Dedup cross-source baseado no padrão já implementado em backend/consolidation.py"
  # ── Novas notas v4.0 ──
  - "Deliverability: domínio dedicado outreach.confenge.com.br + SPF+DKIM+DMARC p=reject + warmup 14-21 dias"
  - "Subject lines: máx 6 palavras. A/B testing obrigatório. Lowercase casual."
  - "LGPD: dados de PNCP = legítimo interesse (Art. 10). Footer com opt-out em TODOS os emails."
  - "Tracking: código AT-{NNN}-{SLUG} + planilha em docs/ataque-turbo-tracking.md"
  - "Decisor: buscar LinkedIn > site > QSA. Sócio do QSA é FALLBACK, não primeira opção."
  - "Benchmarks-alvo: 45-55% open, 12-18% reply (signal-based), 10-20% conversão"
  - "Envio: Ter-Qui, 08-10h BRT. Máx 20 emails/inbox/dia. Nunca seg/sex."
  - "Após 20+ leads: analisar A/B de subjects, calibrar cadência, avaliar ferramenta de automação"
