# =============================================================================
# BidIQ Uniformes - Frontend Railway Configuration
# =============================================================================
# Service: bidiq-frontend
# Framework: Next.js 16 + React 18
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
healthcheckPath = "/api/health"
# SLA-001: 300s timeout for cold starts (Next.js 16 + Sentry + Google Fonts init)
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# SLA-001: 10 retries before giving up (was 3 — too aggressive for transient OOM)
restartPolicyMaxRetries = 10
# SLA-001: 30s overlap for zero-downtime deploys (was 15s — not enough for SSR warm-up)
overlapSeconds = 30
# SLA-001: 15s drain for in-flight SSE/API requests after SIGTERM (was 10s)
drainingSeconds = 15

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - BACKEND_URL (Runtime URL of backend service, e.g. https://bidiq-backend.up.railway.app)
#   - PORT (Auto-injected by Railway)
# =============================================================================
