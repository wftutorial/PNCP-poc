    source: "turbocash.md pipeline de leads"

  tier_1_empresas_b2g:
    description: "Empresas B2G com faturamento relevante e histórico de vitórias em licitações"
    qualification: |
      TODOS os critérios abaixo devem ser satisfeitos:
      1. Vencedora frequente de licitações (≥3 contratos homologados nos últimos 12 meses)
      2. Porte relevante (capital_social ≥ R$100.000 OU porte "DEMAIS"/"EPP")
      3. CNAE compatível com setor que tenha editais abertos no momento
      4. Compra do PDF deve ser no-brainer (valor do relatório << valor das oportunidades)
    approach: "Relatório de oportunidades direto para o decisor"
