# =============================================================================
# BidIQ Uniformes - Backend Railway Configuration
# =============================================================================
# Service: bidiq-backend
# Framework: FastAPI + Python 3.11
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
# NOTE: Using Dockerfile CMD instead of startCommand for proper $PORT expansion
# startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/ready"
# SLA-001: 300s timeout for cold starts (Python + Gunicorn preload + model init)
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# SLA-001: 10 retries before giving up (was 3 — too aggressive for transient OOM)
restartPolicyMaxRetries = 10
# SLA-001: 45s overlap for zero-downtime deploys (SSE streams + long-running searches)
overlapSeconds = 45
# SLA-001: 30s drain for in-flight SSE/search requests after SIGTERM (was 15s)
drainingSeconds = 30

# =============================================================================
# Environment Variables (Set in Railway Dashboard)
# =============================================================================
# REQUIRED:
#   - OPENAI_API_KEY (Get from https://platform.openai.com/api-keys)
#   - PORT (Auto-injected by Railway)
#
# OPTIONAL (with defaults):
#   - LOG_LEVEL=INFO
#   - PNCP_TIMEOUT=30
#   - PNCP_MAX_RETRIES=5
# =============================================================================
