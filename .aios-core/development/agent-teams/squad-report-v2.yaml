name: squad-report-v2
description: "Squad para redesign do report-b2g: arquitetura 3 camadas + fontes novas + links clicáveis"
version: "1.0"
created: "2026-03-14"

mission: >
  Elevar o patamar de qualidade do relatório B2G executivo, reduzindo densidade
  informacional em ~50% via arquitetura de 3 camadas (Decisão/Inteligência/Referência),
  incorporando 3 fontes novas de dados (BrasilAPI, IBGE, PNCP expandido), e tornando
  todas as referências a editais clicáveis para a fonte oficial.

agents:
  - role: data-engineer
    scope: "collect-report-data.py — 3 novas fontes de dados"
    tasks:
      - "collect_brasilapi(): Simples Nacional + MEI + fallback CNPJ"
      - "collect_ibge_municipio(): população + PIB + cache localidades por UF"
      - "Expandir collect_pncp_contratos_fornecedor(): aditivos, situação, subcontratação"
      - "Wiring: main(), assemble_report_data(), args --skip-ibge/--skip-brasilapi"

  - role: architect
    scope: "generate-report-b2g.py — reestruturação 3 camadas"
    tasks:
      - "Reordenar seções: Camada 1 (Decisão) → Camada 2 (Inteligência) → Camada 3 (Anexos)"
      - "Mover NÃO RECOMENDADO para Anexo A (tabela condensada)"
      - "Mover Perfil da Empresa para Anexo B"
      - "Consolidar Fontes+SICAF+QD em Anexo C"
      - "Unificar Portfolio + Regional"

  - role: dev
    scope: "generate-report-b2g.py — fichas compactas + links clicáveis"
    tasks:
      - "Redesign _build_detailed_analysis(): barras visuais, cronograma 1-linha, alertas curtos"
      - "Filtrar: só PARTICIPAR/AVALIAR no corpo, NÃO RECOMENDADO no Anexo"
      - "Integrar dados novos inline: IBGE pop/PIB, Simples badge, aditivos flag"
      - "Tornar toda referência a edital clicável via <a href=link>"

  - role: qa
    scope: "Validação do output final"
    tasks:
      - "Gerar PDF de teste com JSON existente"
      - "Verificar links clicáveis funcionam"
      - "Comparar páginas antes/depois"
      - "Validar que dados IBGE/BrasilAPI aparecem corretamente"

workflow: parallel
  # data-engineer e architect+dev trabalham em paralelo
  # qa valida após ambos terminarem
