# PR metadata validation: title format, body sections, secret scanning, Trivy CRITICAL.
# This is supplementary to backend-tests.yml and frontend-tests.yml (the actual test gates).
name: "PR Validation (Metadata + Security)"

on:
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened]

jobs:
  pr-metadata:
    name: Validate PR Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Check for conventional commit format
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build)(\(.+\))?!?: .+'; then
            echo "❌ PR title must follow Conventional Commits format"
            echo "Examples:"
            echo "  feat: add user authentication"
            echo "  fix(api): resolve rate limiting issue"
            echo "  docs: update README with setup instructions"
            exit 1
          fi
          echo "✅ PR title format is valid"

      - name: Check PR body
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check for required sections using environment variable (safe from injection)
          # Accept either "## Context" or "## Summary" (flexible for different PR templates)
          if ! echo "$PR_BODY" | grep -qE "## (Context|Summary)"; then
            echo "❌ PR body must include '## Context' or '## Summary' section"
            exit 1
          fi

          # "## Changes" is optional - many PRs describe changes in Summary
          if ! echo "$PR_BODY" | grep -q "## Changes"; then
            echo "⚠️ Note: PR body does not include '## Changes' section (optional)"
          fi

          if ! echo "$PR_BODY" | grep -q "## Testing Plan"; then
            echo "❌ PR body must include '## Testing Plan' section"
            exit 1
          fi

          if ! echo "$PR_BODY" | grep -q "## Closes"; then
            echo "❌ PR body must include '## Closes' section linking to issue"
            exit 1
          fi

          echo "✅ PR body includes all required sections"

      - name: Check issue link
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |

          # Check if closes an issue
          if ! echo "$PR_BODY" | grep -qE "(Closes|Fixes|Resolves) #[0-9]+"; then
            echo "⚠️ Warning: PR should close an issue (use 'Closes #N')"
            # Don't fail - just warn
          else
            echo "✅ PR links to issue"
          fi

      - name: Dependabot PR detected
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: |
          echo "✅ Dependabot PR detected - skipping metadata validation"
          echo "Dependabot PRs include comprehensive changelogs and are validated by dependency review checks"

  file-changes:
    name: Analyze File Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for sensitive files
        run: |
          # Check if .env files are being committed
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.env$'; then
            echo "❌ ERROR: .env file detected in changes"
            echo "Never commit .env files. Use .env.example instead."
            exit 1
          fi

          # Check for large files (>5MB)
          for file in $(git diff --name-only origin/${{ github.base_ref }}...HEAD); do
            if [ -f "$file" ]; then
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$size" -gt 5242880 ]; then
                echo "⚠️ Warning: Large file detected: $file ($size bytes)"
              fi
            fi
          done

          echo "✅ No sensitive files detected"

  backend-validation:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if backend exists
        id: check-backend
        run: |
          if [ -d "backend" ] && [ "$(ls -A backend/*.py 2>/dev/null)" ]; then
            echo "has_python_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_python_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check-backend.outputs.has_python_files == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check-backend.outputs.has_python_files == 'true'
        run: |
          cd backend
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install ruff mypy

      # DEBT-123 AC9: Linting — intentionally non-blocking (advisory, not security-critical)
      - name: Lint with Ruff
        if: steps.check-backend.outputs.has_python_files == 'true'
        run: |
          cd backend
          echo "Running Ruff linter..."
          ruff check . --output-format=github || true
          echo "✅ Linting complete"
        continue-on-error: true  # DEBT-123 AC9: intentional — linting is advisory

      # DEBT-123 AC9: Formatting — intentionally non-blocking (advisory, not security-critical)
      - name: Check code formatting
        if: steps.check-backend.outputs.has_python_files == 'true'
        run: |
          cd backend
          echo "Checking Python formatting..."
          ruff format --check . || {
            echo "❌ Code is not formatted. Run 'ruff format .' locally"
            exit 1
          }
          echo "✅ Code formatting is correct"
        continue-on-error: true  # DEBT-123 AC9: intentional — formatting is advisory

      # DEBT-123 AC9: Type checking — intentionally non-blocking (advisory, not security-critical)
      - name: Type checking with mypy
        if: steps.check-backend.outputs.has_python_files == 'true'
        run: |
          cd backend
          if ls *.py 1> /dev/null 2>&1; then
            echo "Running mypy type checker..."
            mypy . --ignore-missing-imports --no-strict-optional || true
            echo "✅ Type checking complete"
          fi
        continue-on-error: true  # DEBT-123 AC9: intentional — type checking is advisory

      - name: Check Python syntax
        if: steps.check-backend.outputs.has_python_files == 'true'
        run: |
          cd backend
          echo "Checking Python syntax..."
          python -m py_compile *.py **/*.py || {
            echo "❌ Python syntax errors detected"
            exit 1
          }
          echo "✅ Python syntax is valid"

  frontend-validation:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "has_package_json=true" >> $GITHUB_OUTPUT
          else
            echo "has_package_json=false" >> $GITHUB_OUTPUT
            echo "⚠️ Frontend not initialized yet (awaiting issue #21)"
          fi

      - name: Set up Node.js
        if: steps.check-frontend.outputs.has_package_json == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.check-frontend.outputs.has_package_json == 'true'
        run: |
          cd frontend
          npm ci || npm install

      # DEBT-123 AC9: Frontend lint — intentionally non-blocking (advisory, not security-critical)
      - name: Lint
        if: steps.check-frontend.outputs.has_package_json == 'true'
        run: |
          cd frontend
          npm run lint || echo "⚠️ Linting not configured yet"
        continue-on-error: true  # DEBT-123 AC9: intentional — linting is advisory

      # DEBT-123 AC9: Frontend type check — intentionally non-blocking (advisory, not security-critical)
      - name: Type check
        if: steps.check-frontend.outputs.has_package_json == 'true'
        run: |
          cd frontend
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || echo "⚠️ Type errors found"
          fi
        continue-on-error: true  # DEBT-123 AC9: intentional — type checking is advisory

      # DEBT-123 AC9: Frontend build — intentionally non-blocking (build validation is advisory in PR validation)
      - name: Build
        if: steps.check-frontend.outputs.has_package_json == 'true'
        run: |
          cd frontend
          npm run build || echo "⚠️ Build not configured yet"
        continue-on-error: true  # DEBT-123 AC9: intentional — build is validated in dedicated CI, advisory here

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trivy scan (CRITICAL — blocking)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

      # DEBT-123 AC9: Trivy HIGH — intentionally non-blocking (CRITICAL is already blocking above)
      - name: Trivy scan (HIGH — warning only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH'
        continue-on-error: true  # DEBT-123 AC9: intentional — CRITICAL already blocking, HIGH is advisory

      # DEBT-123 AC6: Secret scanning — BLOCKING (security-critical)
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check README updates
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^(backend|frontend)/'; then
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q 'README.md'; then
              echo "⚠️ Code changes detected but no README update"
              echo "Consider updating documentation if public APIs changed"
            fi
          fi
          echo "✅ Documentation check complete"

  all-checks-complete:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [pr-metadata, file-changes, documentation]
    steps:
      - name: Success
        run: |
          echo "✅ All validation checks passed!"
          echo "PR is ready for human review."
