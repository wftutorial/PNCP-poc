name: Deploy to Staging

on:
  push:
    branches: [develop, feature/**]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.service }}" in
              all)
                echo "backend=true" >> $GITHUB_OUTPUT
                echo "frontend=true" >> $GITHUB_OUTPUT
                ;;
              backend)
                echo "backend=true" >> $GITHUB_OUTPUT
                echo "frontend=false" >> $GITHUB_OUTPUT
                ;;
              frontend)
                echo "backend=false" >> $GITHUB_OUTPUT
                echo "frontend=true" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
              echo "backend=true" >> $GITHUB_OUTPUT
            else
              echo "backend=false" >> $GITHUB_OUTPUT
            fi
            if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
              echo "frontend=true" >> $GITHUB_OUTPUT
            else
              echo "frontend=false" >> $GITHUB_OUTPUT
            fi
          fi

  check-migrations:
    name: Check Unapplied Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for unapplied migrations
        run: |
          echo "Checking migration status..."
          OUTPUT=$(supabase migration list --linked 2>&1)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Not applied"; then
            echo "::error::Found unapplied migrations! Run 'supabase db push' before deploying."
            exit 1
          fi

          echo "All migrations are applied."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-backend-staging:
    name: Deploy Backend (Staging)
    runs-on: ubuntu-latest
    needs: [detect-changes, check-migrations]
    if: needs.detect-changes.outputs.backend == 'true'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run backend tests
        run: |
          cd backend
          # Coverage threshold temporarily lowered for STORY-165 deployment
          # TODO: Increase coverage to 70% in follow-up story
          pytest --cov --cov-report=json --cov-fail-under=45

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service bidiq-backend --detach
        working-directory: backend

      - name: Wait for deployment
        run: sleep 45

      - name: Health check
        env:
          STAGING_BACKEND_URL: ${{ vars.STAGING_BACKEND_URL }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${STAGING_BACKEND_URL}/health" > /dev/null 2>&1; then
              echo "✅ Staging backend health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "❌ Staging backend health check failed after 5 attempts"
          exit 1

  deploy-frontend-staging:
    name: Deploy Frontend (Staging)
    runs-on: ubuntu-latest
    needs: [detect-changes, check-migrations, deploy-backend-staging]
    if: |
      always() &&
      needs.check-migrations.result == 'success' &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.deploy-backend-staging.result == 'success' || needs.deploy-backend-staging.result == 'skipped')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      # DEBT-123 AC5: Frontend tests and coverage are now blocking (TEMP markers removed)
      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci

      - name: Check frontend coverage
        run: |
          cd frontend
          npm run test:coverage

      - name: Build frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.STAGING_BACKEND_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          cd frontend
          npm run build

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: railway up --service bidiq-frontend --detach
        working-directory: frontend

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${STAGING_FRONTEND_URL}" > /dev/null 2>&1; then
              echo "✅ Staging frontend health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "❌ Staging frontend health check failed after 5 attempts"
          exit 1

  smoke-tests-staging:
    name: Staging Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend-staging, deploy-frontend-staging]
    if: |
      always() &&
      (needs.deploy-backend-staging.result == 'success' || needs.deploy-backend-staging.result == 'skipped') &&
      (needs.deploy-frontend-staging.result == 'success' || needs.deploy-frontend-staging.result == 'skipped') &&
      !(needs.deploy-backend-staging.result == 'skipped' && needs.deploy-frontend-staging.result == 'skipped')

    steps:
      - name: Backend API smoke test
        if: needs.deploy-backend-staging.result == 'success'
        env:
          STAGING_BACKEND_URL: ${{ vars.STAGING_BACKEND_URL }}
        run: |
          echo "=== Backend Smoke Tests (Staging) ==="

          echo "1. Health check..."
          curl -sf "${STAGING_BACKEND_URL}/health" | python3 -m json.tool

          echo "2. Root endpoint..."
          curl -sf "${STAGING_BACKEND_URL}/" | python3 -m json.tool

          echo "3. OpenAPI docs accessible..."
          curl -sf -o /dev/null -w "%{http_code}" "${STAGING_BACKEND_URL}/docs" | grep -q 200

          echo "✅ All backend smoke tests passed (Staging)"

      - name: Frontend smoke test
        if: needs.deploy-frontend-staging.result == 'success'
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        run: |
          echo "=== Frontend Smoke Tests (Staging) ==="

          echo "1. Page loads..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${STAGING_FRONTEND_URL}")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend returned $STATUS"
            exit 1
          fi

          echo "2. Contains expected content..."
          curl -sf "${STAGING_FRONTEND_URL}" | grep -q "SmartLic"

          echo "✅ All frontend smoke tests passed (Staging)"

      - name: Integration smoke test
        if: needs.deploy-backend-staging.result == 'success' && needs.deploy-frontend-staging.result == 'success'
        env:
          STAGING_BACKEND_URL: ${{ vars.STAGING_BACKEND_URL }}
        run: |
          echo "=== Integration Smoke Tests (Staging) ==="

          echo "1. POST /buscar with minimal payload..."
          RESPONSE=$(curl -sf -X POST "${STAGING_BACKEND_URL}/buscar" \
            -H "Content-Type: application/json" \
            -d '{"ufs":["SP"],"data_inicial":"2026-01-20","data_final":"2026-01-27"}' \
            -w "\n%{http_code}" 2>&1 || true)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Response code: $HTTP_CODE"

          # Accept 200 (success) or 404/422 (no results/validation) - just not 500/503
          if [ "$HTTP_CODE" -ge 500 ]; then
            echo "❌ Integration test failed with server error"
            exit 1
          fi

          echo "✅ Integration smoke test passed (Staging)"

  lighthouse-ci-staging:
    name: Lighthouse CI (Staging)
    runs-on: ubuntu-latest
    needs: deploy-frontend-staging
    if: needs.deploy-frontend-staging.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        run: |
          lhci autorun \
            --collect.url="${STAGING_FRONTEND_URL}" \
            --collect.numberOfRuns=3 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.performance=0.7 \
            --assert.assertions.accessibility=0.9 \
            --assert.assertions.best-practices=0.8 \
            --assert.assertions.seo=0.7

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-staging
          path: .lighthouseci/

  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [smoke-tests-staging, lighthouse-ci-staging]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write

    steps:
      - name: Comment deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const statusEmoji = {
              success: '✅',
              failure: '❌',
              skipped: '⏭️'
            };

            const smokeTests = '${{ needs.smoke-tests-staging.result }}';
            const lighthouseCI = '${{ needs.lighthouse-ci-staging.result }}';

            const comment = `
            ## 🚀 Staging Deployment Status

            | Check | Status |
            |-------|--------|
            | Smoke Tests | ${statusEmoji[smokeTests] || '❓'} ${smokeTests} |
            | Lighthouse CI | ${statusEmoji[lighthouseCI] || '❓'} ${lighthouseCI} |

            **Staging URLs:**
            - Backend: ${{ vars.STAGING_BACKEND_URL }}
            - Frontend: ${{ vars.STAGING_FRONTEND_URL }}

            _Deployed from commit ${context.sha.substring(0, 7)}_
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  notify-slack:
    name: Slack Deploy Notification
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-backend-staging, deploy-frontend-staging, smoke-tests-staging]
    if: always()
    steps:
      - name: Check for Slack webhook
        id: check_webhook
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "SLACK_DEPLOY_WEBHOOK not set, skipping notification"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Prepare notification payload
        if: steps.check_webhook.outputs.skip != 'true'
        id: payload
        run: |
          # Determine overall status
          BACKEND_STATUS="${{ needs.deploy-backend-staging.result }}"
          FRONTEND_STATUS="${{ needs.deploy-frontend-staging.result }}"
          SMOKE_STATUS="${{ needs.smoke-tests-staging.result }}"

          # Overall status: failure if any deploy failed, success if all succeeded/skipped
          if [ "$BACKEND_STATUS" = "failure" ] || [ "$FRONTEND_STATUS" = "failure" ]; then
            OVERALL="failure"
            EMOJI="❌"
            COLOR="#dc3545"
          elif [ "$SMOKE_STATUS" = "failure" ]; then
            OVERALL="warning"
            EMOJI="⚠️"
            COLOR="#ffc107"
          else
            OVERALL="success"
            EMOJI="✅"
            COLOR="#28a745"
          fi

          # Determine which services were deployed
          SERVICES=""
          if [ "$BACKEND_STATUS" = "success" ]; then
            SERVICES="Backend"
          fi
          if [ "$FRONTEND_STATUS" = "success" ]; then
            if [ -n "$SERVICES" ]; then
              SERVICES="$SERVICES + Frontend"
            else
              SERVICES="Frontend"
            fi
          fi
          if [ -z "$SERVICES" ]; then
            SERVICES="None (all skipped or failed)"
          fi

          # Short SHA
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # Commit message (first line only, escape special chars for JSON)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/"/\\"/g' | sed "s/'/\\\\'/g" | cut -c1-100)

          # Build services detail
          BACKEND_EMOJI="⏭️"
          FRONTEND_EMOJI="⏭️"
          SMOKE_EMOJI="⏭️"
          [ "$BACKEND_STATUS" = "success" ] && BACKEND_EMOJI="✅"
          [ "$BACKEND_STATUS" = "failure" ] && BACKEND_EMOJI="❌"
          [ "$FRONTEND_STATUS" = "success" ] && FRONTEND_EMOJI="✅"
          [ "$FRONTEND_STATUS" = "failure" ] && FRONTEND_EMOJI="❌"
          [ "$SMOKE_STATUS" = "success" ] && SMOKE_EMOJI="✅"
          [ "$SMOKE_STATUS" = "failure" ] && SMOKE_EMOJI="❌"

          echo "overall=$OVERALL" >> $GITHUB_OUTPUT
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "backend_emoji=$BACKEND_EMOJI" >> $GITHUB_OUTPUT
          echo "frontend_emoji=$FRONTEND_EMOJI" >> $GITHUB_OUTPUT
          echo "smoke_emoji=$SMOKE_EMOJI" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: steps.check_webhook.outputs.skip != 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.payload.outputs.emoji }} SmartLic Staging Deploy — ${{ steps.payload.outputs.overall }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Services:*\n${{ steps.payload.outputs.services }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ steps.payload.outputs.short_sha }}` — ${{ steps.payload.outputs.commit_msg }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.backend_emoji }} Backend" },
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.frontend_emoji }} Frontend" },
                    { "type": "mrkdwn", "text": "${{ steps.payload.outputs.smoke_emoji }} Smoke Tests" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
